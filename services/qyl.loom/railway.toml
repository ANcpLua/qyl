# Railway deployment config for qyl.loom (autofix + triage background agents).

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/qyl.loom/Dockerfile"

[deploy]
startCommand = "dotnet qyl.loom.dll"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# --- Variables to set in Railway UI ---
#
# PORT                           Injected by Railway.
# QYL_COLLECTOR_URL              Railway private URL of the collector, e.g.
#                                `http://qyl-collector.railway.internal:5100`.
# OPENAI_API_KEY                 Required for Autofix + Triage LLM pipelines. Prefer
#                                Railway's shared-variable scope so the collector and mcp
#                                services inherit it.
