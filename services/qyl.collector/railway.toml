# Keep Railway's Root Directory at `/` so the Docker build can copy sibling projects.
# Set the service config path to `/services/qyl.collector/railway.toml`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/qyl.collector/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Railway injects PORT; set QYL_BIND_ADDRESS=0.0.0.0.
# Point QYL_DATA_PATH at a mounted volume for persistence.
# Production defaults QYL_OTLP_AUTH_MODE to ApiKey; store QYL_OTLP_PRIMARY_API_KEY
# as a secret and reserve QYL_OTLP_SECONDARY_API_KEY for key rotation.
# Set QYL_GRPC_PORT=0 unless a separate gRPC endpoint is exposed.
