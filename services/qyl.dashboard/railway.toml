# Railway deployment config for qyl.dashboard (React SPA served by nginx).

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/qyl.dashboard/Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 15
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# --- Variables to set in Railway UI ---
#
# PORT                           Injected by Railway; nginx.conf.template's ${PORT} is
#                                rendered by nginx:alpine's envsubst entrypoint.
# VITE_API_BASE_URL              Public URL of the qyl.collector Railway service. Baked
#                                into the SPA at build time, so set before the deploy.
