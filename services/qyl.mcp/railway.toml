# Railway deployment config for qyl.mcp (Streamable HTTP transport).

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/qyl.mcp/Dockerfile"

[deploy]
startCommand = "dotnet qyl.mcp.dll --transport http"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# --- Variables to set in Railway UI ---
#
# PORT                           Injected by Railway; qyl.mcp reads it via
#                                QylMcpServiceCollectionExtensions → UseUrls.
# QYL_COLLECTOR_URL              Railway private URL of the sibling collector service,
#                                e.g. `http://qyl-collector.railway.internal:5100`.
# QYL_MCP_SKILLS                 Comma-separated skill set (see SkillConfiguration).
# QYL_MCP_SCOPE                  Tenant/workspace scope for MCP tool dispatch.
