# qyl MCP Connector — Anthropic Connector Directory submission manifest
#
# Status: Draft v1.0 — 2026-05-26. Prepared for the Anthropic Connector Directory submission.
# Submission via the form at claude.com/docs/connectors/building/submission.md.
# All `https://qyl.ai/...` URLs below MUST be live (200 OK) before submission.
#
# Re-validation:
#   python3 -c "import yaml; yaml.safe_load(open('docs/connector/manifest.yaml'))"
#   # Followed by manual fetch of every URL field; Anthropic's review queue
#   # rejects manifests with dead links.

name: qyl
version: "1.0.0"
description: |
  Connect Claude to your qyl observability backend — traces, logs,
  metrics, error issues, and GenAI conversation captures. Read-only by
  default; destructive operations (annotation, triage, autofix
  promotion) prompt for confirmation.

long_description: |
  qyl is a self-hosted observability backend that captures OTLP
  telemetry from your services, groups errors into issues, and
  surfaces GenAI conversation analytics. This connector exposes 124
  MCP tools across qyl's read and write surfaces:

  - **93 read-only tools** for inspection: `list_services`,
    `search_traces`, `get_trace_details`, `get_span`, `analyze_session`,
    `analyze_trace`, `suggest_fix`, `qyl.check_regressions`, …
  - **31 destructive tools** for action: `qyl.trigger_triage`,
    `qyl.generate_fix`, `qyl.approve_fix_run`, `create_project`,
    `annotate_trace`, debugger ops, …

  Multi-tenant by design — a single collector may serve multiple
  tenants on one host. The {tenant} route segment selects the tenant
  namespace, but authorization derives from the authenticated token:
  the collector compares the route {tenant} with the token-bound
  TenantId and returns 403 Forbidden on mismatch. Authentication is
  OAuth 2.1 + PKCE with Keycloak as the identity provider; the
  connector exchanges Keycloak tokens for opaque MCP bearer tokens
  stored in your qyl-collector's local DuckDB.

  See the [tool annotations
  audit](https://qyl.ai/connector/tool-annotations-audit) for the
  per-tool safety classifications applied to the directory listing.

# The connector is multi-tenant — {tenant} is a path placeholder the
# user supplies at install time (the slug of their qyl tenant).
server_url: "https://collector.qyl.ai/mcp/{tenant}"

# OAuth 2.1 + PKCE flow per RFC 6749 + RFC 7636. The collector itself
# acts as the OAuth client to the user's Keycloak; Claude only sees the
# opaque bearer token returned by /auth/callback.
oauth_authorization_endpoint: "https://collector.qyl.ai/auth/authorize"
oauth_token_endpoint: "https://collector.qyl.ai/auth/callback"
# RFC 9728 Protected Resource Metadata — Claude can also auto-discover
# the OAuth endpoints from this URL (preferred over the hard-coded fields
# above; this endpoint ships with the /mcp/{tenant} host, still to be built).
protected_resource_metadata: "https://collector.qyl.ai/mcp/{tenant}/.well-known/oauth-protected-resource"

scopes_required:
  - openid
  - profile
  - email
  - offline_access

privacy_policy_url: "https://qyl.ai/connector/privacy"
terms_of_service_url: "https://qyl.ai/connector/terms"

assets:
  # 64x64 PNG, transparent background. Used in the Claude connector chooser.
  logo_small: "https://qyl.ai/connector/assets/logo-64.png"
  # 512x512 PNG, transparent background. Used in the directory listing card.
  logo_large: "https://qyl.ai/connector/assets/logo-512.png"

# At least 3 screenshots showing real qyl tool calls inside Claude.
# Required by Anthropic directory submission rules.
screenshots:
  - url: "https://qyl.ai/connector/assets/screenshot-list-services.png"
    caption: "Listing services in a qyl tenant from a Claude conversation."
  - url: "https://qyl.ai/connector/assets/screenshot-trace-analysis.png"
    caption: "Drilling into a trace via analyze_trace; LLM-generated synthesis of root cause."
  - url: "https://qyl.ai/connector/assets/screenshot-autofix-run.png"
    caption: "Promoting a Loom autofix run from triage → merged with qyl.approve_fix_run (destructive, requires explicit user approval)."

# Categories the directory should index this connector under.
categories:
  - observability
  - monitoring
  - genai-ops
  - error-tracking

# Pre-submission checklist — every item MUST be ✅ before posting the
# submission form. Maintained in this manifest so future-us doesn't
# rediscover the gates from scratch.
submission_checklist:
  - "✅ All 124 [McpServerTool] methods carry Title + (ReadOnly|Destructive) — verified by tool-annotations-audit.md."
  - "⏳ Privacy policy hosted at privacy_policy_url and returns 200 (PENDING qyl.ai DNS + CDN setup)."
  - "⏳ Terms of service hosted at terms_of_service_url and returns 200 (PENDING)."
  - "⏳ Logo PNGs exist at assets URLs and return 200 (PENDING design assets)."
  - "⏳ Screenshots exist at assets URLs and return 200 (PENDING real-claude-conversation captures)."
  - "⏳ Phase 2 (/auth/*) merged on main via PR #372 — prod deploy PENDING."
  - "⏳ Phase 3 (/mcp/{tenant} host + Bearer auth + RFC 9728 metadata) merged — PENDING (next build)."
  - "⏳ QYL_KEYCLOAK_* env vars set on Railway collector service (PENDING)."
  - "⏳ Real Keycloak realm provisioned at the Authority URL with PKCE-required client (PENDING)."
  - "⏳ End-to-end smoke: a fresh user with no prior qyl access can: find listing → click Connect → see qyl tools → make a real tool call successfully."
