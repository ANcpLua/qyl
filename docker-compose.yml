services:
  collector:
    build:
      context: .
      dockerfile: src/qyl.collector/Dockerfile
    ports:
      - "5100:5100"   # Dashboard + REST API + SSE
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
    volumes:
      - qyl-data:/data
    environment:
      QYL_DATA_PATH: /data/qyl.duckdb
      QYL_GRPC_PORT: "4317"
      QYL_OTLP_PORT: "4318"
      QYL_OTLP_AUTH_MODE: Unsecured
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  loom:
    build:
      context: .
      dockerfile: src/qyl.loom/Dockerfile
    ports:
      - "5200:5200"
    environment:
      QYL_COLLECTOR_URL: http://collector:5100
    depends_on:
      collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5200/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  qyl-data:
