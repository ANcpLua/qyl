# =============================================================================
# Forgejo Documentation Research Corpus Extraction
# -----------------------------------------------------------------------------
# Runs the Forgejo research script to extract documentation corpus from
# shallow clones of qyl, Forgejo docs, website, runner, and server repositories.
# Outputs corpus.ndjson, manifest.json, route-index.json, and API notes.
# =============================================================================

name: Forgejo Documentation Research

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  research:
    name: Extract Forgejo Documentation Corpus
    runs-on: docker

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Run Forgejo research script
        run: node eng/forgejo/research-forgejo-docs.mjs

      - name: Upload research artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: forgejo-research-corpus
          path: artifacts/forgejo-research/
          retention-days: 7
