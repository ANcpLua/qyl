name: Forgejo AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: forgejo-ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  review:
    name: Review pull request diff
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Forgejo AI review
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QYL_AI_REVIEW_OPENAI_MODEL: ${{ secrets.QYL_AI_REVIEW_OPENAI_MODEL }}
          QYL_AI_REVIEW_OPENAI_REASONING_EFFORT: ${{ secrets.QYL_AI_REVIEW_OPENAI_REASONING_EFFORT }}
          QYL_AI_REVIEW_ANTHROPIC_MODEL: ${{ secrets.QYL_AI_REVIEW_ANTHROPIC_MODEL }}
          QYL_AI_REVIEW_CODEX_COMMAND: ${{ secrets.QYL_AI_REVIEW_CODEX_COMMAND }}
          QYL_AI_REVIEW_CLAUDE_COMMAND: ${{ secrets.QYL_AI_REVIEW_CLAUDE_COMMAND }}
          QYL_AI_REVIEW_CODERABBIT_COMMAND: ${{ secrets.QYL_AI_REVIEW_CODERABBIT_COMMAND }}
          QYL_AI_REVIEW_FAIL_ON_PROVIDER_ERROR: "false"
          QYL_AI_REVIEW_POST_COMMENT: "true"
          QYL_AI_REVIEW_REQUIRE_COMMENT: "true"
        run: node eng/forgejo-ai-review/review.mjs
