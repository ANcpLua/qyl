# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "qyl"

[setup]
script = '''
set -euo pipefail
cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

# Qyl's contract checks require the adjacent private qyl-api-schema checkout.
# A managed worktree gets a temporary sibling symlink to the source workspace copy.
schema_source="$(dirname "${CODEX_SOURCE_TREE_PATH:?CODEX_SOURCE_TREE_PATH is required}")/qyl-api-schema"
schema_worktree="$(dirname "$CODEX_WORKTREE_PATH")/qyl-api-schema"
schema_contract="generated/openapi/qyl.openapi.json"

if [[ ! -f "$schema_worktree/$schema_contract" ]]; then
  if [[ -e "$schema_worktree" ]]; then
    echo "Incomplete qyl-api-schema sibling at $schema_worktree" >&2
    exit 1
  fi
  if [[ ! -f "$schema_source/$schema_contract" ]]; then
    echo "Missing qyl-api-schema source checkout at $schema_source" >&2
    exit 1
  fi
  ln -s "$schema_source" "$schema_worktree"
fi

dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false
npm --prefix services/qyl.dashboard ci
npm --prefix packages/Qyl.Run.Console ci
'''

[cleanup]
script = '''
cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"
if docker info >/dev/null 2>&1; then
  docker compose -f eng/compose.yaml down --remove-orphans || true
fi

schema_source="$(dirname "${CODEX_SOURCE_TREE_PATH:?CODEX_SOURCE_TREE_PATH is required}")/qyl-api-schema"
schema_worktree="$(dirname "$CODEX_WORKTREE_PATH")/qyl-api-schema"
if [[ "$CODEX_WORKTREE_PATH" != "$CODEX_SOURCE_TREE_PATH" ]] &&
   [[ -L "$schema_worktree" ]] &&
   [[ "$(readlink "$schema_worktree")" == "$schema_source" ]]; then
  rm "$schema_worktree"
fi

rm -rf .cache/tmp
'''

[[actions]]
name = "Build"
icon = "tool"
command = "dotnet build qyl.slnx --configuration Release --no-restore --configfile nuget.config"

[[actions]]
name = "Verify"
icon = "test"
command = "./eng/build.sh Verify --Configuration Release"

[[actions]]
name = "Frontend tests"
icon = "test"
command = "npm --prefix services/qyl.dashboard run test:coverage"

[[actions]]
name = "Pack Qyl.Run"
icon = "tool"
command = "./eng/build.sh Pack --Configuration Release"

[[actions]]
name = "Run Qyl host"
icon = "run"
command = "QYL_OTLP_AUTH_MODE=Unsecured dotnet run --project packages/Qyl.Run.Host --configuration Release"

[[actions]]
name = "Dashboard dev"
icon = "run"
command = "npm --prefix services/qyl.dashboard run dev"
