# =============================================================================
# Dependabot Configuration
# -----------------------------------------------------------------------------
# Baseline dependency governance for GitHub Actions, NuGet, npm, and .NET SDK.
# Groups related packages to reduce PR noise and prevent version skew.
# Paired with workflows/auto-merge.yml for safe automated merging.
# =============================================================================

version: 2
updates:
  # .NET SDK version updates
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps(sdk)"
      include: "scope"
    labels:
      - "dependencies"
      - "dotnet-sdk"

  # NuGet package updates
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:15"
      timezone: "UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(nuget)"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    groups:
      ancplua-sdk:
        patterns:
          - "ANcpLua.NET.Sdk"
          - "ANcpLua.NET.Sdk.Test"
          - "ANcpLua.NET.Sdk.Web"
          - "ANcpSdk.AspNetCore.ServiceDefaults*"
      ancplua-utilities:
        patterns:
          - "ANcpLua.Roslyn.Utilities*"
          - "ANcpLua.Analyzers"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.Testing.*"
          - "AwesomeAssertions"
      grpc:
        patterns:
          - "Grpc.*"
          - "Google.Protobuf"
      duckdb:
        patterns:
          - "DuckDB.*"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm (dashboard) updates
  - package-ecosystem: "npm"
    directory: "/src/qyl.dashboard"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:45"
      timezone: "UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(npm)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      qyl-dashboard-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
