# Deletion trigger for services/qyl.collector/Ingestion/DeprecatedAttributeNormalizer.cs.
#
# The normalizer exists because CURRENT GenAI SDK releases still emit pre-1.42 semconv keys
# (proven 2026-07-11: OpenAI 2.12.0 emits gen_ai.system with no gen_ai.provider.name at all;
# Microsoft.Extensions.AI 10.7.0 still carries the legacy spelling in its emit path). qyl
# subscribes to those libraries' ActivitySources, and auto-instrumentation captures their
# spans with THEIR key spellings — the ingest normalizer is the only translation layer.
#
# This weekly check downloads the LATEST STABLE of each monitored package and scans its
# assemblies for the legacy key string:
#   - any package still contains it -> the shim is still needed -> green (offenders logged)
#   - all packages clean            -> the shim has expired     -> red + an issue is opened
#     with the deletion checklist (normalizer file, its OtlpConverter call sites,
#     DbSystemDeprecated projection constant + catalog regen, and this workflow).
name: normalizer-expiry

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Legacy gen_ai.system still shipped by monitored SDKs?
    runs-on: ubuntu-latest
    steps:
      - name: Scan latest stable packages
        id: scan
        shell: python
        run: |
          import io, json, os, urllib.request, zipfile

          PACKAGES = ["openai", "microsoft.extensions.ai"]
          NEEDLE = "gen_ai.system"

          offenders = []
          for pkg in PACKAGES:
              with urllib.request.urlopen(f"https://api.nuget.org/v3-flatcontainer/{pkg}/index.json") as r:
                  versions = json.load(r)["versions"]
              stable = [v for v in versions if "-" not in v]
              if not stable:
                  raise SystemExit(f"no stable version found for {pkg}")
              ver = stable[-1]
              url = f"https://api.nuget.org/v3-flatcontainer/{pkg}/{ver}/{pkg}.{ver}.nupkg"
              with urllib.request.urlopen(url) as r:
                  nupkg = zipfile.ZipFile(io.BytesIO(r.read()))
              hit = any(
                  NEEDLE.encode("utf-8") in nupkg.read(name) or NEEDLE.encode("utf-16-le") in nupkg.read(name)
                  for name in nupkg.namelist()
                  if name.startswith("lib/") and name.endswith(".dll")
              )
              print(f"{pkg} {ver}: {'still ships legacy gen_ai.system' if hit else 'CLEAN'}")
              if hit:
                  offenders.append(f"{pkg} {ver}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"clean={'true' if not offenders else 'false'}\n")
              f.write(f"offenders={', '.join(offenders)}\n")

      - name: Open the deletion issue once
        if: steps.scan.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "DeprecatedAttributeNormalizer in:title" --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "DeprecatedAttributeNormalizer has expired — the monitored SDKs no longer emit legacy keys" \
              --body "$(printf '%s\n' \
                "The weekly normalizer-expiry scan found the latest stable openai and microsoft.extensions.ai packages free of the legacy gen_ai.system key. The ingest shim has no remaining reason to exist." \
                "" \
                "Deletion checklist:" \
                "- [ ] Delete services/qyl.collector/Ingestion/DeprecatedAttributeNormalizer.cs" \
                "- [ ] Remove its four call sites in services/qyl.collector/Ingestion/OtlpConverter.cs" \
                "- [ ] Remove DbSystemDeprecated from eng/config/collector-semantic-policy.json and regenerate the catalog" \
                "- [ ] Delete .github/workflows/normalizer-expiry.yml (this trigger)" \
                "- [ ] Update the single-mention self-instrumentation note in the workspace CLAUDE.md")"
          fi

      - name: Fail the run so the expiry is visible
        if: steps.scan.outputs.clean == 'true'
        run: |
          echo "::error::All monitored SDKs are clean — delete DeprecatedAttributeNormalizer (see the opened issue)."
          exit 1
