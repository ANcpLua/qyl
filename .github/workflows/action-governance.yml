# =============================================================================
# Action Version Governance
# -----------------------------------------------------------------------------
# Runs a weekly scan of workflow action versions, detects drift versus latest
# stable releases, optionally rewrites versions, and creates/updates a single
# consolidated PR. Can also be triggered manually with allow_major override.
#
# Paired with auto-merge.yml governance-auto-merge job for hands-free updates.
# =============================================================================

name: Action Governance

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      allow_major:
        description: "Allow major version bumps"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: action-governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  govern-actions:
    name: Detect and heal action version drift
    runs-on: ubuntu-latest

    env:
      GOVERNANCE_BRANCH: chore/action-governance
      ALLOW_MAJOR: ${{ inputs.allow_major || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run governance scan
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          args=(--fix --report-json .github/action-governance-report.json --report-md .github/action-governance-report.md)
          if [[ "${ALLOW_MAJOR}" == "true" ]]; then
            args+=(--allow-major)
          fi

          python3 .github/scripts/action_version_governance.py "${args[@]}" | tee governance-output.txt

          drift="$(grep -E '^drift_detected=' governance-output.txt | tail -n1 | cut -d'=' -f2)"
          echo "drift_detected=$drift" >> "$GITHUB_OUTPUT"

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v6
        with:
          name: action-governance-report
          path: |
            .github/action-governance-report.json
            .github/action-governance-report.md
            governance-output.txt
          retention-days: 30

      - name: Create or update consolidated PR
        if: steps.scan.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          base_branch="${{ github.event.repository.default_branch }}"
          branch="${GOVERNANCE_BRANCH}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"

          git add .github/workflows
          git add .github/action-governance-report.json .github/action-governance-report.md || true

          if git diff --cached --quiet; then
            echo "No file changes after scan despite drift flag; exiting."
            exit 0
          fi

          git commit -m "chore: govern GitHub Action versions"

          git push --force-with-lease origin "$branch"

          pr_number="$(gh pr list --base "$base_branch" --head "$branch" --state open --json number --jq '.[0].number // empty')"

          body_file="$(mktemp)"
          {
            echo "## Action Version Governance Drift Report"
            echo
            cat .github/action-governance-report.md
            echo
            echo "### Automation Notes"
            echo "- This PR is consolidated (single PR for all workflow action drift)."
            echo "- Major updates are blocked unless workflow_dispatch allow_major=true."
            echo "- Generated by \`.github/workflows/action-governance.yml\`."
          } > "$body_file"

          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" \
              --title "chore: action version governance updates" \
              --body-file "$body_file"
          else
            gh pr create \
              --base "$base_branch" \
              --head "$branch" \
              --title "chore: action version governance updates" \
              --body-file "$body_file" \
              --label "dependencies"
          fi
