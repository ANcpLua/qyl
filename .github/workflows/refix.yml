# HappyOnigiri/Refix — runs Claude Code on CI to fix CodeRabbit comments,
# CI failures, and merge conflicts on PRs.
#
# Repo: https://github.com/HappyOnigiri/Refix (MIT, user-owned, 0★ at install)
# Marketplace: https://github.com/marketplace/actions/refix-action
#
# Security posture: this Action runs Claude Code with a token that has
# write access to the repo and pushes commits autonomously. The upstream
# template at scripts/templates/run-refix.yml explicitly resists SHA
# pinning, runs on `issue_comment` from arbitrary commenters, adds a 1-hour
# cron, and asks for a long-lived classic PAT. qyl rejects all four:
#
#   1. SHA-pin to the v1.4.0 tag commit — drift in @main of a low-traction
#      MIT-licensed repo with write access to qyl is not acceptable. The
#      upstream README permits SHA pinning ("users may pin to a SHA or
#      switch to @v1 at their own discretion").
#   2. Restrict `issue_comment` triggers to OWNER / MEMBER / COLLABORATOR
#      author_association — the upstream template tells the runner to do
#      `author_association` filtering inside `filter_event.py`; we add a
#      defence-in-depth gate at the workflow `if:` level so a malicious
#      comment from a drive-by contributor cannot dispatch Claude.
#   3. Skip the hourly recovery cron — it's a recovery mechanism for missed
#      events, not a primary trigger. If a refix is genuinely needed and
#      the event-based triggers missed it, run `workflow_dispatch` manually.
#   4. Use the existing AUTOMERGE_APP installation token (the same one the
#      auto-merge tiers consume) instead of a long-lived classic PAT. The
#      app-token expires in ~1 hour and is scoped per-installation.
#
# CLAUDE_CODE_OAUTH_TOKEN already exists in repo secrets; no new secrets
# need to be added for this workflow.
#
# NOTE: same enterprise allow-list caveat as anti-slop.yml — the pattern
# `HappyOnigiri/Refix@*` must land in the enterprise/org Actions allow-list
# or this workflow startup_fails.

name: Refix (Claude auto-fix)

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to process
        required: true
        type: number
      dry-run:
        description: Run without making changes
        required: false
        type: boolean
        default: false
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: refix-${{ github.event.pull_request.number || github.event.issue.number || inputs['pr-number'] || github.event_name }}
  cancel-in-progress: false

jobs:
  refix:
    # Gate 1: manual dispatch is always allowed.
    # Gate 2: pull_request_target only when the maintainer added the
    #         `refix:requested` label (no auto-trigger on every push).
    # Gate 3: issue_comment only on a PR (not an issue) and only from
    #         OWNER / MEMBER / COLLABORATOR — defence-in-depth against
    #         arbitrary commenters dispatching Claude.
    if: >
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request_target' &&
         github.event.label.name == 'refix:requested') ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request != null &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v6.0.0

      # Mint a short-lived installation token (≈1h) from the same App that
      # auto-merge uses, instead of a long-lived classic PAT.
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Run Refix
        uses: HappyOnigiri/Refix@e0731daee880e3f43498a6da6d1d2133ad848dd9 # v1.4.0
        with:
          gh-token: ${{ steps.app-token.outputs.token }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          pr-number: ${{ inputs.pr-number || github.event.pull_request.number || github.event.issue.number }}
          dry-run: ${{ inputs.dry-run || false }}
