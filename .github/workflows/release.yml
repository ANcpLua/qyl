# =============================================================================
# Release Pipeline
# -----------------------------------------------------------------------------
# Builds, tests, packages, and publishes qyl on tag push or manual dispatch.
# Produces GitHub Release with collector + dashboard tarballs and Docker images
# pushed to Docker Hub and GitHub Container Registry.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "22"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Restore .NET dependencies
        run: dotnet restore -p:TreatWarningsAsErrors=false

      - name: Build .NET solution
        run: |
          dotnet build --configuration Release --no-restore \
            -p:RunAnalyzers=false \
            -p:RunAnalyzersDuringBuild=false \
            -p:TreatWarningsAsErrors=false \
            -p:WarningsAsErrors=

      - name: Run .NET tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Install frontend dependencies
        working-directory: services/qyl.dashboard
        run: npm ci

      - name: Run frontend type check
        working-directory: services/qyl.dashboard
        run: npm run typecheck

      - name: Run frontend lint
        working-directory: services/qyl.dashboard
        run: npm run lint

      - name: Run frontend tests
        working-directory: services/qyl.dashboard
        run: |
          if find src -name "*.test.ts" -o -name "*.spec.ts" 2>/dev/null | grep -q .; then
            npm run test -- --run
          else
            echo "No test files found, skipping"
          fi

      - name: Build frontend
        working-directory: services/qyl.dashboard
        run: npm run build

      - name: Publish qyl.collector
        run: |
          dotnet publish services/qyl.collector/qyl.collector.csproj \
            --configuration Release \
            --no-restore \
            --output ./publish/collector \
            -p:PublishAot=false \
            -p:Version=${{ steps.version.outputs.version_number }} \
            -p:RunAnalyzers=false \
            -p:RunAnalyzersDuringBuild=false \
            -p:TreatWarningsAsErrors=false \
            -p:WarningsAsErrors=

      - name: Package artifacts
        run: |
          mkdir -p ./release

          cd ./publish/collector
          tar -czvf ../../release/qyl-collector-linux-x64-${{ steps.version.outputs.version }}.tar.gz .
          cd ../..

          cd ./services/qyl.dashboard/dist
          tar -czvf ../../../release/qyl-dashboard-${{ steps.version.outputs.version }}.tar.gz .
          cd ../../..

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## qyl ${{ steps.version.outputs.version }}

          ### Components

          | Component | Version | Description |
          |-----------|---------|-------------|
          | qyl.collector | ${{ steps.version.outputs.version_number }} | Native AOT OTLP collector with DuckDB storage |
          | qyl.dashboard | ${{ steps.version.outputs.version_number }} | React 19 observability dashboard |

          ### Frontend Stack

          | Package | Version |
          |---------|---------|
          | React | 19.2.0 |
          | TypeScript | 5.9.3 |
          | Vite | 7.2.6 |
          | TailwindCSS | 4.1.17 |
          | TanStack Query | 5.90.11 |
          | TanStack Table | 8.21.3 |
          | Recharts | 2.15.4 |
          | Radix UI | Latest |

          ### Backend Stack

          | Package | Version |
          |---------|---------|
          | .NET | 10.0 |
          | DuckDB | 1.4.1 |
          | gRPC | 2.76.0 |
          | OpenTelemetry | 1.14.0 |

          ### Installation

          ```bash
          # Download and extract collector
          tar -xzvf qyl-collector-linux-x64-${{ steps.version.outputs.version }}.tar.gz
          ./qyl.collector

          # Dashboard is served by the collector at http://localhost:8080
          ```

          ### Checksums

          ```
          $(sha256sum ./release/*.tar.gz)
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v4
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: qyl ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            ./release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pack-nuget:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_NUMBER="${{ inputs.version }}"
          else
            VERSION_NUMBER="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Install TypeSpec deps + compile emitters
        working-directory: core/specs
        run: |
          npm install --legacy-peer-deps
          npm run compile

      - name: Pack Qyl.Contracts
        run: dotnet pack packages/Qyl.Contracts/Qyl.Contracts.csproj -c Release -o nupkg -p:Version=${{ steps.version.outputs.version_number }}

      - name: Pack Qyl.OpenTelemetry.Extensions
        run: dotnet pack packages/Qyl.OpenTelemetry.Extensions/Qyl.OpenTelemetry.Extensions.csproj -c Release -o nupkg -p:Version=${{ steps.version.outputs.version_number }}

      - name: Pack Qyl.Client
        run: dotnet pack packages/Qyl.Client/Qyl.Client.csproj -c Release -o nupkg -p:Version=${{ steps.version.outputs.version_number }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  pack-npm:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org/"

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_NUMBER="${{ inputs.version }}"
          else
            VERSION_NUMBER="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Install TypeSpec deps + compile emitters
        working-directory: core/specs
        run: |
          npm install --legacy-peer-deps
          npm run compile

      - name: Install @qyl/client deps
        working-directory: packages/qyl-client
        run: npm install

      - name: Stamp version
        working-directory: packages/qyl-client
        run: npm version ${{ steps.version.outputs.version_number }} --no-git-tag-version --allow-same-version

      - name: Build @qyl/client
        working-directory: packages/qyl-client
        run: npm run build

      - name: Publish @qyl/client
        working-directory: packages/qyl-client
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: services/qyl.collector/Dockerfile
          push: true
          tags: |
            ancplua/qyl:${{ steps.version.outputs.version }}
            ancplua/qyl:${{ steps.version.outputs.version_number }}
            ancplua/qyl:latest
            ghcr.io/ancplua/qyl:${{ steps.version.outputs.version }}
            ghcr.io/ancplua/qyl:latest
          labels: |
            org.opencontainers.image.title=qyl
            org.opencontainers.image.description=AI Observability Platform - OpenTelemetry collector with DuckDB storage
            org.opencontainers.image.version=${{ steps.version.outputs.version_number }}
            org.opencontainers.image.source=https://github.com/ANcpLua/qyl
