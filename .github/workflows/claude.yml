name: Claude Code

# Triggers intentionally narrow. The wider set (pull_request_review_comment
# + pull_request_review) generated 70+ action_required entries on PR #334
# alone — GitHub gates same-repo workflows that fire on bot-authored review
# events BEFORE the job-level `if:` filter evaluates, and the `/runs/.../approve`
# endpoint is fork-PR-only so the gating can't be auto-bypassed by an
# automation token. Issue/PR conversation comments cover the @claude
# tagging surface for everything except inline file-line comments, which
# is the only feature lost.
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1
        continue-on-error: true
        timeout-minutes: 15
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot],renovate[bot]'
          track_progress: true

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--max-turns 25'
