# Single destructive auto-merge tier. Supersedes the previous trio
# (ancplua-auto-merge.yml + governance-auto-merge.yml + auto-merge.yml's
# upstream reusable-workflow call). For any PR authored by a trusted
# identity, the AUTOMERGE_APP installation token auto-approves the PR
# (overriding any sticky CHANGES_REQUESTED from CodeRabbit / Copilot
# review) and then `gh pr merge --admin --squash --delete-branch` to
# bypass any future branch-protection or required-review rules.
#
# The only safety the destructive tier preserves is the dependency-bot
# stable-update gate: PRs from renovate[bot] / dependabot[bot] are
# skipped when their title/labels/body mark them as major or prerelease
# (alpha/beta/rc/preview). Those are reckless to admin-merge, not
# destructive.
#
# `--admin` requires the AUTOMERGE_APP installation to hold admin
# permission on the repo. Enterprise allow-list permits the App via the
# `ANcpLua/renovate-config/*` pattern (and the App is installed at the
# org level, so this works across the org).
#
# Trigger surface is intentionally wide — every PR-state-changing event
# and every check_suite completion — so the merge fires the moment the
# PR is in a mergeable shape regardless of which path got it there.
# Concurrency is per-PR with `cancel-in-progress: false` so simultaneous
# triggers serialize cleanly; whichever wins the merge first leaves the
# others as "PR already merged" no-ops.
#
# Required secrets:
#   AUTOMERGE_APP_ID, AUTOMERGE_APP_PRIVATE_KEY

name: Auto-merge (destructive — admin)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, auto_merge_enabled]
  pull_request_review:
    types: [submitted, dismissed]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to admin-merge
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: destructive-auto-merge-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || inputs['pr-number'] }}
  cancel-in-progress: false

jobs:
  destructive-auto-merge:
    name: Destructive admin auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Filter:
    #   1. For check_suite events, require an associated PR (skip CI runs
    #      on default branch).
    #   2. Author must be in the trusted-identity allow-list. The list
    #      mirrors the upstream renovate-config tiers (Dependabot,
    #      Renovate, AI Agent, CodeRabbit, Owner) plus the qyl-local
    #      `ANcpLua` maintainer identity and the `github-actions[bot]`
    #      governance identity.
    #   3. PR not draft, not already closed.
    if: >
      (github.event_name != 'check_suite' ||
       (github.event.check_suite.pull_requests &&
        github.event.check_suite.pull_requests[0] != null)) &&
      contains(fromJSON('["ANcpLua","renovate[bot]","dependabot[bot]","copilot[bot]","jules[bot]","claude-code[bot]","github-actions[bot]","coderabbitai[bot]"]'),
               github.event.pull_request.user.login || github.event.check_suite.pull_requests[0].user.login) &&
      (github.event.pull_request.draft != true) &&
      (github.event.pull_request.state != 'closed')
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Resolve PR number
        id: pr
        env:
          N_PR: ${{ github.event.pull_request.number }}
          N_CS: ${{ github.event.check_suite.pull_requests[0].number }}
          N_DI: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail
          n="${N_PR:-${N_CS:-${N_DI:-}}}"
          [ -n "$n" ] || { echo "no PR number resolvable from event" >&2; exit 1; }
          echo "n=$n" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$n"

      - name: Skip major + prerelease for dependency bots
        id: gate
        env:
          PR_N: ${{ steps.pr.outputs.n }}
          PR_AUTHOR: >-
            ${{ github.event.pull_request.user.login ||
                github.event.check_suite.pull_requests[0].user.login }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          case "$PR_AUTHOR" in
            renovate\[bot\]|dependabot\[bot\])
              meta="$(gh pr view "$PR_N" --json title,labels,body \
                        --jq '[.title, (.labels|map(.name)|join(" ")), (.body // "")] | join(" ")')"
              if printf '%s\n' "$meta" \
                   | grep -Eiq '(^|[^[:alnum:]])major([^[:alnum:]]|$)|(^|[.-])(alpha|beta|preview|rc)([.-]|$)'; then
                echo "gate=skip" >> "$GITHUB_OUTPUT"
                echo "::notice::PR #$PR_N from $PR_AUTHOR is major/prerelease — destructive merge skipped"
                exit 0
              fi
              ;;
          esac
          echo "gate=merge" >> "$GITHUB_OUTPUT"

      - name: Auto-approve (override sticky CHANGES_REQUESTED)
        if: steps.gate.outputs.gate == 'merge'
        env:
          PR_N: ${{ steps.pr.outputs.n }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # `|| true` because gh refuses to approve a PR the App already
          # approved, which is fine — we just want an active approval on
          # record so admin merge has cover under any future protection.
          gh pr review "$PR_N" --approve \
            --body "✅ Auto-approved by destructive auto-merge (admin tier)" || true

      - name: Admin squash-merge
        if: steps.gate.outputs.gate == 'merge'
        env:
          PR_N: ${{ steps.pr.outputs.n }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # --admin bypasses required reviews + required status checks +
          # branch protection. Most aggressive auto-merge path for
          # trusted-identity PRs. If the PR is already merged or closed
          # by a racing tier, gh exits non-zero — swallow with `|| true`
          # then verify state.
          set +e
          gh pr merge "$PR_N" --admin --squash --delete-branch
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            state="$(gh pr view "$PR_N" --json state --jq .state)"
            if [ "$state" = "MERGED" ] || [ "$state" = "CLOSED" ]; then
              echo "::notice::PR #$PR_N already $state — destructive merge no-op"
              exit 0
            fi
            echo "::error::admin merge failed and PR is still $state" >&2
            exit $rc
          fi
