# =============================================================================
# Docker End-to-End Validation
# -----------------------------------------------------------------------------
# Builds local qyl Docker images and runs tests tagged Category=E2E.
# =============================================================================

name: E2E (Docker)

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/e2e-docker.yml"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "eng/**"
      - "global.json"
      - "internal/**"
      - "packages/**"
      - "qyl.slnx"
      - "services/qyl.collector/**"
      - "services/qyl.dashboard/**"
      - "services/qyl.loom/**"
      - "services/qyl.loom.patterns/**"
      - "services/qyl.mcp/**"
      - "tests/qyl.e2e.tests/**"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/e2e-docker.yml"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "eng/**"
      - "global.json"
      - "internal/**"
      - "packages/**"
      - "qyl.slnx"
      - "services/qyl.collector/**"
      - "services/qyl.dashboard/**"
      - "services/qyl.loom/**"
      - "services/qyl.loom.patterns/**"
      - "services/qyl.mcp/**"
      - "tests/qyl.e2e.tests/**"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read
  packages: read

concurrency:
  group: e2e-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "22"

jobs:
  docker-e2e:
    name: Docker topology
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            **/*.csproj
            **/*.fsproj
            **/packages.lock.json
            **/nuget.config

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: core/specs/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@o-ancpplua'

      - name: Cache Weaver binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .tools/weaver
          key: weaver-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('eng/semconv/bootstrap-weaver.sh', 'eng/semconv/bootstrap-weaver.ps1', 'eng/semconv/scripts/bootstrap-weaver.sh', 'eng/semconv/scripts/bootstrap-weaver.ps1') }}

      - name: Regenerate TypeSpec artifacts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./eng/build.sh Generate

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Docker topology E2E
        run: ./eng/build.sh E2ETests --configuration Release
