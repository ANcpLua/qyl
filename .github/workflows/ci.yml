# =============================================================================
# Continuous Integration
# -----------------------------------------------------------------------------
# Local truth is the NUKE build in eng/build. qyl no longer regenerates API
# contracts, OpenAPI, or semconv packages inside this repository; those come from
# qyl-api-schema and Qyl.OpenTelemetry.SemanticConventions packages.
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend (.NET)
    runs-on: qyl-linux

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # VerifyCollectorEndpointLimitsMatchOpenApi reads the API contract from the
      # sibling qyl-api-schema repo (RootDirectory.Parent/qyl-api-schema/...). It is a
      # separate PUBLIC repo with the generated OpenAPI committed, so a shallow,
      # unauthenticated clone into the sibling path is all the Verify gate needs.
      - name: Checkout API schema contract
        run: |
          # Self-hosted runners keep a persistent _work dir, so a leftover clone from a
          # previous run would make `git clone` abort ("destination already exists").
          # Clean the sibling path first so the checkout is idempotent across runs.
          target="${{ github.workspace }}/../qyl-api-schema"
          rm -rf "$target"
          git clone --depth 1 https://github.com/ANcpLua/qyl-api-schema.git "$target"

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            **/*.csproj
            **/*.fsproj
            **/packages.lock.json
            **/nuget.config

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Restore
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Build
        run: dotnet build qyl.slnx --configuration Release --no-restore --configfile nuget.config

      # Live contract-conformance: boots the collector over in-memory DuckDB, seeds via OTLP,
      # and validates /api/v1 responses deserialize into the generated Qyl.Api.Contracts DTOs.
      - name: Collector contract conformance test
        run: dotnet run --project evals/Qyl.Collector.Contract.Tests/Qyl.Collector.Contract.Tests.csproj --configuration Release --no-build

      - name: Verify
        run: ./eng/build.sh Verify --Configuration Release

  frontend:
    name: Frontend (React)
    runs-on: qyl-linux

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Install
        working-directory: services/qyl.dashboard
        run: npm ci

      - name: Typecheck
        working-directory: services/qyl.dashboard
        run: npm run typecheck

      - name: Lint
        working-directory: services/qyl.dashboard
        run: npm run lint

      - name: Build
        working-directory: services/qyl.dashboard
        run: npm run build

      - name: Coverage
        working-directory: services/qyl.dashboard
        run: npm run test:coverage

      - name: Upload coverage report
        if: always() && hashFiles('services/qyl.dashboard/coverage/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-coverage
          path: services/qyl.dashboard/coverage
          retention-days: 14

  dependency-audit:
    name: Dependency Audit
    runs-on: qyl-linux

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Restore
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Audit .NET packages
        run: |
          while IFS= read -r -d '' project; do
            dotnet list "$project" package --vulnerable --include-transitive
          done < <(
            find . -name '*.csproj' \
              -not -path './Artifacts/*' \
              -not -path './artifacts/*' \
              -not -path '*/bin/*' \
              -not -path '*/obj/*' \
              -print0
          )

      - name: Audit frontend packages
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          # Audit production dependencies only. Dev tooling (vite, @babel/core, eslint, shadcn) is
          # never shipped to users, and its advisories — mostly Windows dev-server issues — should
          # not gate CI. Production deps currently audit clean at --audit-level=high.
          npm audit --audit-level=high --omit=dev
