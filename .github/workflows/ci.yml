# =============================================================================
# Continuous Integration
# -----------------------------------------------------------------------------
# Local truth is the NUKE build in eng/build. qyl no longer regenerates API
# contracts, OpenAPI, or semconv packages inside this repository; those come from
# qyl-api-schema and Qyl.OpenTelemetry.SemanticConventions packages.
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            services/qyl.dashboard/package-lock.json
            packages/Qyl.Host.Console/package-lock.json

      - name: Restore
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Build
        run: dotnet build qyl.slnx --configuration Release --no-restore --configfile nuget.config

      - name: Test
        run: dotnet test qyl.slnx --configuration Release --no-build --no-restore

      - name: Verify
        run: ./eng/build.sh Verify --Configuration Release

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            services/qyl.dashboard/package-lock.json
            packages/Qyl.Host.Console/package-lock.json

      - name: Install
        working-directory: services/qyl.dashboard
        run: npm ci

      - name: Typecheck
        working-directory: services/qyl.dashboard
        run: npm run typecheck

      - name: Lint
        working-directory: services/qyl.dashboard
        run: npm run lint

      - name: Build
        working-directory: services/qyl.dashboard
        run: npm run build

      - name: Install runner console
        working-directory: packages/Qyl.Host.Console
        run: npm ci

      - name: Typecheck runner console
        working-directory: packages/Qyl.Host.Console
        run: npm run typecheck

      - name: Build runner console
        working-directory: packages/Qyl.Host.Console
        run: npm run build

      - name: Coverage
        working-directory: services/qyl.dashboard
        run: npm run test:coverage

      - name: Upload coverage report
        if: always() && hashFiles('services/qyl.dashboard/coverage/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-coverage
          path: services/qyl.dashboard/coverage
          retention-days: 14

  product-e2e:
    name: Embedded product (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Build dashboard
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          npm run build

      - name: Restore collector
        run: dotnet restore services/qyl.collector/qyl.collector.csproj --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Build embedded Release collector
        run: dotnet build services/qyl.collector/qyl.collector.csproj --configuration Release --no-restore -p:QylEmbedDashboard=true

      - name: Install Chromium
        working-directory: services/qyl.dashboard
        run: npx playwright install --with-deps chromium

      - name: Run product smoke
        working-directory: services/qyl.dashboard
        run: npm run e2e

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            services/qyl.dashboard/package-lock.json
            packages/Qyl.Host.Console/package-lock.json

      - name: Restore
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Audit .NET packages
        run: |
          while IFS= read -r -d '' project; do
            dotnet list "$project" package --vulnerable --include-transitive
          done < <(
            find . -name '*.csproj' \
              -not -path './Artifacts/*' \
              -not -path './artifacts/*' \
              -not -path './eng/reference/*' \
              -not -path '*/bin/*' \
              -not -path '*/obj/*' \
              -print0
          )

      - name: Audit frontend packages
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          # Audit production dependencies only. Dev tooling (vite, @babel/core, eslint, shadcn) is
          # never shipped to users, and its advisories — mostly Windows dev-server issues — should
          # not gate CI. Production deps currently audit clean at --audit-level=high.
          npm audit --audit-level=high --omit=dev

      - name: Audit runner-console packages
        working-directory: packages/Qyl.Host.Console
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev
