
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_VERSION: "24"

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.paths.outputs.backend }}
      frontend: ${{ steps.paths.outputs.frontend }}
      product_e2e: ${{ steps.paths.outputs.product_e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Select safe lanes
        id: paths
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed < <(git diff-tree --root --no-commit-id --name-only -r "$HEAD_SHA")
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t changed < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          else
            mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi

          backend=false
          frontend=false
          product_e2e=false

          if [ ${#changed[@]} -eq 0 ]; then
            backend=true
            frontend=true
            product_e2e=true
          fi

          for path in "${changed[@]}"; do
            case "$path" in
              README.md|AGENTS.md|CLAUDE.md|docs/*)
                ;;
              .github/*.md)
                if [[ "${path#.github/}" == */* ]]; then
                  backend=true
                  frontend=true
                  product_e2e=true
                fi
                ;;
              *.md)
                if [[ "$path" == */* ]]; then
                  backend=true
                  frontend=true
                  product_e2e=true
                fi
                ;;
              services/qyl.dashboard/*)
                frontend=true
                product_e2e=true
                ;;
              services/qyl.collector/*)
                backend=true
                product_e2e=true
                ;;
              packages/Qyl.Host/*|packages/Qyl.Run.Host/*|packages/Qyl.Run.Workload/*|internal/*|tests/*)
                backend=true
                ;;
              *)
                backend=true
                frontend=true
                product_e2e=true
                ;;
            esac
          done

          printf 'backend=%s\nfrontend=%s\nproduct_e2e=%s\n' \
            "$backend" "$frontend" "$product_e2e" >> "$GITHUB_OUTPUT"

          if [ "$backend" = false ] && [ "$frontend" = false ]; then
            echo "::notice title=Docs-only change::No build, test, audit, or NativeAOT lane is needed."
          else
            echo "Selected lanes: backend=$backend frontend=$frontend product_e2e=$product_e2e"
          fi

  backend:
    name: Backend (.NET)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Build
        run: dotnet build qyl.slnx --configuration Release --no-restore --configfile nuget.config -p:QylAot=false

      - name: Test
        run: dotnet test qyl.slnx --configuration Release --no-build --no-restore

      - name: Verify
        run: ./eng/build.sh VerifyBackend --Configuration Release

  native-aot:
    name: NativeAOT runtime smokes
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Execute native collector and MCP gates
        run: ./eng/build.sh NativeAot

  frontend:
    name: Frontend (React)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Install
        working-directory: services/qyl.dashboard
        run: npm ci

      - name: Typecheck
        working-directory: services/qyl.dashboard
        run: npm run typecheck

      - name: Lint
        working-directory: services/qyl.dashboard
        run: npm run lint

      - name: Build
        working-directory: services/qyl.dashboard
        run: npm run build

      - name: Verify generated contract consumption
        run: ./eng/build.sh VerifyFrontendApiTypes --Configuration Release

      - name: Coverage
        working-directory: services/qyl.dashboard
        run: npm run test:coverage

      - name: Upload coverage report
        if: always() && hashFiles('services/qyl.dashboard/coverage/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-coverage
          path: services/qyl.dashboard/coverage
          retention-days: 14

  product-e2e:
    name: Embedded product (Playwright)
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.product_e2e == 'true' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Build dashboard
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          npm run build

      - name: Restore collector
        run: dotnet restore services/qyl.collector/qyl.collector.csproj --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Build embedded Release collector
        run: dotnet build services/qyl.collector/qyl.collector.csproj --configuration Release --no-restore -p:QylEmbedDashboard=true

      - name: Install Chromium
        working-directory: services/qyl.dashboard
        run: npx playwright install --with-deps chromium

      - name: Run product smoke
        working-directory: services/qyl.dashboard
        run: npm run e2e

  dependency-audit:
    name: Dependency Audit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Restore
        if: needs.changes.outputs.backend == 'true'
        run: dotnet restore qyl.slnx --configfile nuget.config -p:TreatWarningsAsErrors=false

      - name: Audit .NET packages
        if: needs.changes.outputs.backend == 'true'
        run: |
          while IFS= read -r -d '' project; do
            dotnet list "$project" package --vulnerable --include-transitive
          done < <(
            find . -name '*.csproj' \
              -not -path './Artifacts/*' \
              -not -path './artifacts/*' \
              -not -path './eng/reference/*' \
              -not -path '*/bin/*' \
              -not -path '*/obj/*' \
              -print0
          )

      - name: Audit frontend packages
        if: needs.changes.outputs.frontend == 'true'
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          npm audit --audit-level=moderate
