name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    if: |
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.pull_request.title, '[skip review]') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 100

      - name: Prepare Claude Code install directory
        run: mkdir -p "$HOME/.local/bin"

      - name: Run Claude Code Review (agentic)
        id: claude-review
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1
        continue-on-error: true
        timeout-minutes: 10
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot],renovate[bot]'
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: '--model claude-opus-4-7 --max-turns 25'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Operating mode: agentic. You have write access to this PR branch.

            Decision tree:
            1. Mechanically fixable qyl rule violations, stale docs, obvious
               generated-artifact drift, missing cancellation, blocking async,
               DateTime.Now/UtcNow in domain code, null-forgiving operators, or
               suppressions that can be rewritten -> fix in a commit pushed to
               this branch.
            2. Structural concerns needing maintainer judgment -> leave one
               focused PR comment and stop.
            3. Clean -> post one approval-style comment and stop.

            Read AGENTS.md / CLAUDE.md first. For semconv work, upstream
            OpenTelemetry YAML and Weaver-generated output are authoritative.
