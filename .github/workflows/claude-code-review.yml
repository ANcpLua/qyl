name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - 'CHANGELOG.md'
      - '**/*.lock'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/yarn.lock'
      - '**/*.snap'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    # Loop-prevention + skip hatches
    if: |
      github.actor != 'coderabbitai[bot]' &&
      !contains(github.event.pull_request.title, '[skip review]') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 20

      - name: Run Claude Code Review (agentic)
        id: claude-review
        uses: anthropics/claude-code-action@2cc1ac1331eac7a6a96d716dd204dd2888d0fcd2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'renovate[bot]'
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: '--model claude-opus-4-7 --max-turns 25'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Operating mode: **agentic**. You have write access to this PR branch.

            Decision tree for every issue you find:
            1. **Mechanically fixable** (formatting, naming, simple logic, missing
               null check, wrong async pattern, suppression that can be rewritten,
               outdated example, broken link, missing CancellationToken, IDisposable
               not disposed, blocking async, .Result/.Wait()) → apply the fix in a
               commit pushed to this branch. Don't ask permission.
            2. **Structural concern needing human judgment** (architectural trade-off,
               novel pattern, transitive-dependency conflict, breaking public API,
               OTel semantic-convention drift, MCP protocol violation that needs spec
               consultation, ambiguous DuckDB schema migration) → flag in a comment
               and stop.
            3. **Clean** → post a single approval-style comment summarizing what you
               verified and stop.

            Do not ping the human for things you can fix yourself.

            Read AGENTS.md / CLAUDE.md / .coderabbit.yaml for repo invariants.
            The .coderabbit.yaml path_instructions are authoritative — especially
            the "ARCHITECTURAL INVARIANTS" sections under src/**/*.cs.
