# Auto-merge — native GitHub auto-merge via GITHUB_TOKEN. No custom App, no
# AUTOMERGE_* secrets, no reusable workflow. The 2026 pattern.
#
# Who handles what:
# - Renovate bot PRs   → handled entirely by the shared preset
#                        (github>ANcpLua/renovate-config) which sets
#                        platformAutomerge:true (Renovate default) and
#                        automerge:true on the relevant packageRules. Renovate
#                        enables native GitHub auto-merge at PR-open time.
# - Owner PRs          → enabled on PR open. Checks both repository_owner
#                        (covers user-owned repos like ANcpLua/*) AND an
#                        explicit 'ancplua' login (qyl lives under
#                        O-ANcppLua org, so repository_owner alone misses
#                        Alexander's own PRs from his user account).
# - AI Agent PRs       → branches matching claude/, copilot/, codex/,
#                        coderabbit/, codacy/. Identity check intentionally
#                        skipped — the qyl-risk-policy memory accepts the
#                        "anyone can push to claude/foo" risk in exchange
#                        for zero-config new-agent onboarding.
# - CodeRabbit-approved → enabled when an approving review lands
#
# Dependabot + Jules: not used here, so no tier. The active agent surface
# is Claude Code, GitHub Copilot Cloud Agent, OpenAI Codex (the
# chatgpt-codex-connector App), CodeRabbit (autofix), and Codacy (autofix).
#
# Background: the AUTOMERGE_APP_ID GitHub App was deleted on 2026-05-12 as an
# antipattern (single point of failure across 4 repos, maintenance overhead,
# and Renovate's platformAutomerge already does the bot tier natively without
# it). For the human/agent tiers, GITHUB_TOKEN's pull-request:write scope is
# enough — branch protection still gates the actual merge on required checks.

name: Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false && (
        startsWith(github.event.pull_request.head.ref, 'claude/') ||
        startsWith(github.event.pull_request.head.ref, 'copilot/') ||
        startsWith(github.event.pull_request.head.ref, 'codex/') ||
        startsWith(github.event.pull_request.head.ref, 'coderabbit/') ||
        startsWith(github.event.pull_request.head.ref, 'codacy/') ||
        github.event.pull_request.user.login == github.repository_owner ||
        github.event.pull_request.user.login == 'ancplua' ||
        (github.event_name == 'pull_request_review'
         && github.event.review.state == 'approved'
         && github.event.review.user.login == 'coderabbitai[bot]')
      )
    steps:
      - name: Enable native auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
