# =============================================================================
# Auto-merge for Trusted PRs
# -----------------------------------------------------------------------------
# Tiers:
#   1a. Dependabot: Auto-approve + auto-merge patch/minor; Claude review major
#   1b. Renovate: Auto-approve + auto-merge
#   2.  CodeRabbit approved: Auto-merge when CI passes
#   3.  Governance bot: Auto-merge action version governance PRs
#   4.  Owner PRs: Auto-merge when CI passes
#
# Auto-approval of agent-authored fix PRs (copilot/, jules/, claude/) was
# intentionally removed: the workflow approving its own agent's output is a
# rubber-stamp with no quality signal. Real signal comes from independent
# reviewers reaching "approved" review state after their findings are
# addressed (Tier 2). The intended loop:
#   reviewer agent posts findings -> autofix workflow applies them ->
#   re-review on push -> reviewer approves -> Tier 2 auto-merges.
#
# Uses pull_request_target for security (runs in base branch context).
# All merges wait for required status checks before completing.
# =============================================================================

name: Auto-merge

on:
  pull_request_target:
    types: [ opened, synchronize, reopened, ready_for_review ]
  pull_request_review:
    types: [ submitted ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot-auto-merge:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate auto-merge eligibility
        id: eligibility
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor)
              echo "eligible=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Auto-approve patch and minor updates
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge for patch and minor
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Request Claude review for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          gh pr comment "$PR_URL" --body "## ⚠️ Major Version Update

          @claude Please review this major version update for breaking changes and merge if safe.

          | Dependency | Update |
          |------------|--------|
          | \`$DEP_NAMES\` | \`$PREV_VERSION\` → \`$NEW_VERSION\` |

          Check the changelog and verify compatibility."

  renovate-auto-merge:
    name: Renovate auto-merge
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.draft == false

    steps:
      - name: Auto-approve Renovate PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge for Renovate
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

  coderabbit-auto-merge:
    name: CodeRabbit auto-merge
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'coderabbitai[bot]'

    steps:
      - name: Enable auto-merge for CodeRabbit approved PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

  governance-auto-merge:
    name: Governance bot auto-merge
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'chore/action-governance' &&
      github.event.pull_request.draft == false

    steps:
      - name: Verify only .github files changed
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(gh pr diff "$PR_URL" --name-only)
          if echo "$files" | grep -qvE '^\.github/'; then
            echo "PR contains changes outside .github/ — skipping auto-merge"
            exit 0
          fi
          echo "All changes scoped to .github/ — safe to auto-merge"

      - name: Auto-approve governance PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL" \
            --body "✅ Auto-approved: action governance update (scoped to .github/)"

      - name: Enable auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

  owner-auto-merge:
    name: Owner auto-merge
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == github.event.repository.owner.login &&
      github.event.pull_request.draft == false

    steps:
      - name: Enable auto-merge for owner PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
