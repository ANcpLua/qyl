# Upstream reusable-workflow auto-merge tiers (Dependabot, Renovate, AI Agent,
# CodeRabbit, Owner). This file is GATED by the enterprise/org Actions
# allow-list: until `ANcpLua/renovate-config/*` is in `patterns_allowed`, this
# workflow run dies at startup_failure on every trigger and none of the tiers
# fire. The local maintainer-author tier lives in `ancplua-auto-merge.yml`
# and the governance-bot tier in `governance-auto-merge.yml` — both isolated
# from this allow-list state so they run regardless.
#
# Required secrets:
#   AUTOMERGE_APP_ID, AUTOMERGE_APP_PRIVATE_KEY
# See https://github.com/ANcpLua/renovate-config#auto-merge-reusable-workflow

name: Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    uses: ANcpLua/renovate-config/.github/workflows/auto-merge-reusable.yml@2ca117da3e29887ce41f3c9abbcb96b14e3f79ab # main (PR #12 - immediate stable bot dependency auto-merge; major/prerelease skipped)
    secrets: inherit
