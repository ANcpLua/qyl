name: NuGet trusted publishing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: Force the publish lane (immutable-version guards still apply)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CI: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "24"

jobs:
  version:
    name: Decide whether to publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Read version and inspect its immutable tag
        id: version
        shell: bash
        run: |
          VERSION="$(sed -n 's:.*<QylVersion>\([^<]*\)</QylVersion>.*:\1:p' Version.props)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Version.props contains an invalid QylVersion: '$VERSION'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Pull requests validate consumers but never publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Forced publish requested for v$VERSION."
            exit 0
          fi

          TAG="v$VERSION"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_COMMIT" = "$GITHUB_SHA" ]; then
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "$TAG already belongs to this commit; the publish lane will verify the immutable release."
            else
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "::notice title=Nothing to publish::$TAG already belongs to $TAG_COMMIT; skipping consumer smokes and packaging."
            fi
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$TAG is new; the publish lane will run."
          fi

  verify:
    name: Consumer smoke (${{ matrix.os }})
    needs: version
    if: github.event_name == 'pull_request' || needs.version.outputs.publish == 'true'
    concurrency:
      group: nuget-verify-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      VERSION: ${{ needs.version.outputs.version }}
      PACKAGES: ${{ github.workspace }}/Artifacts/qyl-packages
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Build embedded dashboard
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          npm run build

      - name: Test runner contracts
        run: dotnet test tests/Qyl.Host.Tests/Qyl.Host.Tests.csproj --configuration Release -p:Version="$VERSION"

      - name: Pack current platform
        run: |
          RID="$(dotnet --info | awk '/ RID:/ { print $2; exit }')"
          if [ -z "$RID" ]; then
            echo "Could not determine the .NET runtime identifier." >&2
            exit 1
          fi
          mkdir -p "$PACKAGES"
          dotnet pack packages/Qyl.Host/Qyl.Host.csproj --configuration Release --output "$PACKAGES" \
            -p:Version="$VERSION" -p:RepositoryCommit="$GITHUB_SHA" -p:SourceRevisionId="$GITHUB_SHA"
          dotnet pack packages/Qyl.Run.Host/Qyl.Run.Host.csproj --configuration Release --output "$PACKAGES" \
            -p:Version="$VERSION" -p:RepositoryCommit="$GITHUB_SHA" -p:SourceRevisionId="$GITHUB_SHA" \
            -p:ToolPackageRuntimeIdentifiers="$RID"

      - name: Install and exercise the packed tool
        # The smoke's internal phase timeouts cap it well under 5 minutes; the step limit
        # exists so a wedged run fails fast with logs instead of idling to the job timeout
        # (a macOS leg once sat 48 minutes with the step stuck in_progress and no log blob).
        timeout-minutes: 12
        env:
          # CI dogfooding: phase markers double as OTLP spans that qyl.mcp's ci_log
          # tool reads. Inert until the QYL_CI_OTLP_ENDPOINT repo variable points at
          # a reachable qyl collector ingest.
          QYL_CI_OTLP_ENDPOINT: ${{ vars.QYL_CI_OTLP_ENDPOINT }}
          QYL_CI_API_KEY: ${{ secrets.QYL_CI_API_KEY }}
          QYL_CI_RUN_ID: nuget-publish-${{ github.run_id }}
          QYL_CI_LEG: ${{ matrix.os }}
        run: dotnet run --project eng/tools/QylToolSmoke/QylToolSmoke.csproj --configuration Release -- "$PACKAGES"

  pack:
    name: Pack release set
    needs: [version, verify]
    if: github.event_name != 'pull_request' && needs.version.outputs.publish == 'true'
    concurrency:
      group: nuget-pack-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      PACKAGES: Artifacts/nuget
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/qyl.dashboard/package-lock.json

      - name: Build embedded dashboard
        working-directory: services/qyl.dashboard
        run: |
          npm ci
          npm run build

      - name: Pack all release packages
        shell: bash
        run: |
          rm -rf "$PACKAGES"
          mkdir -p "$PACKAGES"
          dotnet pack packages/Qyl.Host/Qyl.Host.csproj --configuration Release --output "$PACKAGES" \
            -p:Version="$VERSION" -p:RepositoryCommit="$GITHUB_SHA" -p:SourceRevisionId="$GITHUB_SHA"
          dotnet pack packages/Qyl.Run.Host/Qyl.Run.Host.csproj --configuration Release --output "$PACKAGES" \
            -p:Version="$VERSION" -p:RepositoryCommit="$GITHUB_SHA" -p:SourceRevisionId="$GITHUB_SHA"

      - name: Validate package identity and provenance
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import os
          import sys
          import zipfile
          import xml.etree.ElementTree as ET

          expected = {
              "Qyl.Host", "qyl",
              "qyl.linux-x64", "qyl.linux-arm64",
              "qyl.osx-x64", "qyl.osx-arm64",
              "qyl.win-x64", "qyl.win-arm64",
          }
          native = {
              "linux-x64": "libduckdb.so", "linux-arm64": "libduckdb.so",
              "osx-x64": "libduckdb.dylib", "osx-arm64": "libduckdb.dylib",
              "win-x64": "duckdb.dll", "win-arm64": "duckdb.dll",
          }
          actual = set()
          for path in glob.glob("Artifacts/nuget/*.nupkg"):
              with zipfile.ZipFile(path) as package:
                  nuspec = next(name for name in package.namelist() if name.endswith(".nuspec"))
                  root = ET.fromstring(package.read(nuspec))
                  entries = set(package.namelist())
                  if path.endswith(f"qyl.{os.environ['VERSION']}.nupkg"):
                      settings = package.read("tools/net10.0/any/DotnetToolSettings.xml").decode("utf-8-sig")
                      for rid in native:
                          route = f'RuntimeIdentifier="{rid}" Id="qyl.{rid}"'
                          if route not in settings:
                              raise SystemExit(f"Outer qyl package is missing route: {route}")
              values = {node.tag.rsplit("}", 1)[-1]: node for node in root.iter()}
              package_id = values["id"].text
              version = values["version"].text
              commit = values["repository"].attrib.get("commit")
              if package_id in actual:
                  raise SystemExit(f"Duplicate package id: {package_id}")
              if version != os.environ["VERSION"]:
                  raise SystemExit(f"{package_id} has version {version}, expected {os.environ['VERSION']}")
              if commit != os.environ["GITHUB_SHA"]:
                  raise SystemExit(f"{package_id} has repository commit {commit}, expected {os.environ['GITHUB_SHA']}")
              rid = package_id.removeprefix("qyl.")
              if rid in native:
                  prefix = f"tools/net10.0/{rid}"
                  required = {
                      f"{prefix}/DotnetToolSettings.xml",
                      f"{prefix}/collector/qyl.collector.dll",
                      f"{prefix}/collector/qyl.collector.deps.json",
                      f"{prefix}/collector/qyl.collector.runtimeconfig.json",
                      f"{prefix}/collector/{native[rid]}",
                  }
                  missing = required - entries
                  if missing:
                      raise SystemExit(f"{package_id} is missing runtime entries: {sorted(missing)}")
              actual.add(package_id)
          if actual != expected:
              raise SystemExit(f"Package set mismatch. Missing={sorted(expected-actual)} Extra={sorted(actual-expected)}")
          print(f"Validated {len(actual)} packages at {os.environ['GITHUB_SHA']}.")
          PY

      - name: Exercise the complete release set
        run: dotnet run --project eng/tools/QylToolSmoke/QylToolSmoke.csproj --configuration Release -- "$PACKAGES"

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: Artifacts/nuget/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish immutable release
    needs: [version, pack]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.version.outputs.publish == 'true'
    concurrency:
      group: nuget-publish-${{ needs.version.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Guard version tag
        shell: bash
        run: |
          TAG="v$VERSION"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
              echo "$TAG already belongs to $TAG_COMMIT; bump QylVersion in Version.props." >&2
              exit 1
            fi
          fi

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Reject an immutable-version mismatch
        shell: bash
        run: |
          ids=(
            qyl.linux-x64 qyl.linux-arm64 qyl.osx-x64 qyl.osx-arm64 qyl.win-x64 qyl.win-arm64
            Qyl.Host qyl
          )
          for id in "${ids[@]}"; do
            lower_id="${id,,}"
            remote="$RUNNER_TEMP/${lower_id}.nupkg"
            url="https://api.nuget.org/v3-flatcontainer/${lower_id}/${VERSION}/${lower_id}.${VERSION}.nupkg"
            status="$(curl --location --silent --show-error --output "$remote" --write-out '%{http_code}' "$url")"
            if [ "$status" = "404" ]; then
              continue
            fi
            if [ "$status" != "200" ]; then
              echo "NuGet returned HTTP $status for $id $VERSION." >&2
              exit 1
            fi
            COMMIT="$(REMOTE_PACKAGE="$remote" python3 - <<'PY'
          import os
          import zipfile
          import xml.etree.ElementTree as ET
          with zipfile.ZipFile(os.environ["REMOTE_PACKAGE"]) as package:
              nuspec = next(name for name in package.namelist() if name.endswith(".nuspec"))
              root = ET.fromstring(package.read(nuspec))
          repository = next(node for node in root.iter() if node.tag.rsplit("}", 1)[-1] == "repository")
          print(repository.attrib.get("commit", ""))
          PY
            )"
            if [ "$COMMIT" != "$GITHUB_SHA" ]; then
              echo "$id $VERSION is already immutable at commit '$COMMIT'; current commit is $GITHUB_SHA. Bump QylVersion in Version.props." >&2
              exit 1
            fi
          done

      # Keep OIDC authentication immediately before the push. The temporary key
      # is single-use and valid for one hour; no long-running build may follow it.
      - name: Authenticate to NuGet
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Push in dependency order
        shell: bash
        run: |
          packages=(
            qyl.linux-x64 qyl.linux-arm64 qyl.osx-x64 qyl.osx-arm64 qyl.win-x64 qyl.win-arm64
            Qyl.Host qyl
          )
          for id in "${packages[@]}"; do
            package="artifacts/${id}.${VERSION}.nupkg"
            if [ ! -f "$package" ]; then
              echo "Missing release artifact: $package" >&2
              exit 1
            fi
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

      - name: Wait for the public feed
        shell: bash
        run: |
          ids=(
            qyl.linux-x64 qyl.linux-arm64 qyl.osx-x64 qyl.osx-arm64 qyl.win-x64 qyl.win-arm64
            qyl.host qyl
          )
          deadline=$((SECONDS + 900))
          while true; do
            pending=()
            for id in "${ids[@]}"; do
              url="https://api.nuget.org/v3-flatcontainer/${id}/${VERSION}/${id}.${VERSION}.nupkg"
              if ! curl --fail --silent --show-error --output /dev/null "$url"; then
                pending+=("$id")
              fi
            done
            if [ ${#pending[@]} -eq 0 ]; then
              break
            fi
            if [ $SECONDS -ge $deadline ]; then
              echo "Timed out waiting for NuGet: ${pending[*]}" >&2
              exit 1
            fi
            echo "Waiting for NuGet indexing: ${pending[*]}"
            sleep 15
          done

      - name: Install and exercise public NuGet in a clean consumer
        shell: bash
        run: |
          export NUGET_PACKAGES="$RUNNER_TEMP/public-packages"
          tool="$RUNNER_TEMP/public-tool"
          deadline=$((SECONDS + 600))
          until dotnet tool install qyl --tool-path "$tool" --version "$VERSION" \
            --source https://api.nuget.org/v3/index.json --no-cache; do
            rm -rf "$tool" "$NUGET_PACKAGES"
            if [ $SECONDS -ge $deadline ]; then
              echo "Timed out installing qyl $VERSION from public NuGet." >&2
              exit 1
            fi
            sleep 15
          done
          test "$("$tool/qyl" --version)" = "$VERSION"
          dotnet run --project eng/tools/QylToolSmoke/QylToolSmoke.csproj --configuration Release -- \
            --installed "$tool/qyl" --version "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --generate-notes --title "$TAG"
          fi
