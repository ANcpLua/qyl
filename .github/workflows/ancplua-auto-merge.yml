# Local auto-merge tier for PRs authored by ANcpLua against the
# Alexander-Nachtmann/qyl org. The upstream "Owner" tier in
# ANcpLua/renovate-config/.github/workflows/auto-merge-reusable.yml
# matches `pull_request.user.login == repository.owner.login`, which
# the PR author (ANcpLua) is not — the repo is owned by the
# Alexander-Nachtmann org, not the user. Keeping this tier in its own
# workflow file isolates it from the allow-list state of the upstream
# reusable workflow: if the org-level `patterns_allowed` ever drops
# `ANcpLua/renovate-config/*`, this tier still runs.
#
# Required secrets:
#   AUTOMERGE_APP_ID, AUTOMERGE_APP_PRIVATE_KEY

name: Auto-merge (ANcpLua author)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ancplua-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  ancplua-auto-merge:
    name: ANcpLua author auto-merge
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: >
      github.event.pull_request.user.login == 'ANcpLua' &&
      github.event.pull_request.draft == false
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Enable auto-merge for ANcpLua-authored PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # Mirror the upstream reusable workflow's `--auto || direct-squash`
        # fallback: --auto when branch protection or merge-queue gates exist,
        # immediate squash when they don't.
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"
