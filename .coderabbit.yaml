  - path: services/qyl.collector/**/*.cs
    instructions: Collector/DuckDB/OTLP hot path. Writes must go through the repository
      write gate/transaction pattern used by the repo; reads must use read-only leases.
      Flag LINQ/allocation-heavy hot path changes, missing backpressure, incorrect
      semantic-convention mapping, and endpoint behavior drifting from TypeSpec contracts.
  - path: services/qyl.mcp/**/*.cs
    instructions: MCP server tools. Tool registration should flow through source generators/attributes,
      not manual duplicated registries. Tool methods need accurate schemas/descriptions,
      lineage/depth limits where tools spawn investigations, and instrumentation around
      JSON-RPC envelopes and tool errors.
  - path: services/qyl.dashboard/**/*.ts
    instructions: React dashboard. Enforce shared UI wrappers, accessible roles, strict
      TypeScript, no direct fetch bypassing the API client, no waitForTimeout in tests,
      and no visual regression in dense operational flows.
  - path: services/qyl.dashboard/**/*.tsx
    instructions: React dashboard. Enforce shared UI wrappers, accessible roles, strict
      TypeScript, no direct fetch bypassing the API client, no waitForTimeout in tests,
      and no visual regression in dense operational flows.
  - path: eng/semconv/**
    instructions: Semantic-convention source models. Model changes must regenerate
      downstream C#/TS/SQL/TypeSpec/docs artifacts in the same PR. Stability values
      must match official OTel states, and generated files must not be hand-edited.
  - path: services/qyl.collector/Ingestion/**
    instructions: 'OTLP ingestion — the hottest path in the system. Review for: correctness
      of OpenTelemetry semantic convention usage (target v1.41.0), proper protobuf/gRPC
      handling, backpressure and error handling on the ingest path, and DuckDB write
      patterns. Flag unnecessary allocations, copies, or LINQ in hot paths. Prefer
      Span<T> and ArrayPool where applicable.'
  - path: services/qyl.loom*/**/*.cs
    instructions: 'Loom autofix + exploration agents (MAF, Microsoft.Agents.AI 1.3.0).
      qyl three-builder pattern: IXxxChatClientBuilder → IXxxAgentsBuilder → workflow.
      Every Build*Agent() factory must double-wrap telemetry: (1) llm.AsAIAgent(...).AsBuilder().UseQylAgentTelemetry().Build()
      on the AIAgent layer, AND (2) the IChatClient wrapped via .WithQylTelemetry(...)
      or .UseQylTelemetry(...) on a ChatClientBuilder. Wrapping only one of the two
      silently halves the OTel attributes. Agent runs via agent.RunAsync(...) (non-streaming)
      or InProcessExecution.RunStreamingAsync + run.WatchStreamAsync (streaming workflows).
      Local tools via AIFunctionFactory.Create with Name = "qyl.<area>.<verb>". Workflows
      via WorkflowBuilder + .WithOutputFrom(...).Build(). Do not introduce raw new
      ActivitySource(...) in agent code — telemetry routes through the GenAi facade
      in internal/qyl.instrumentation/Instrumentation/GenAi/.'
  - path: internal/qyl.instrumentation/**/*.cs
    instructions: 'Composition-root telemetry facades. Review for: ActivitySource
      ownership, correct span status mapping (both thrown exceptions AND silent CallToolResult.IsError
      == true must surface), attribute keys via QylAttr.<Namespace>.<Name> from packages/Qyl.Telemetry/Conventions/Qyl.g.cs
      (never raw strings), standard OTel keys via Qyl.OpenTelemetry.SemanticConventions{,Incubating}
      (ServiceAttributes, HttpAttributes, …). Business filters chain AFTER the facade
      — never replace the facade''s span emission with ad-hoc tracing.'
  - path: packages/**/*.cs
    instructions: Public NuGet surface. XML docs are required on every public/protected
      member (intent, contracts, exception conditions — audience is external consumers).
      No `null!`, no analyzer suppressions, no swallow-and-fallback. Avoid adding
      new public API surface without an explicit reason in the PR description. Generated
      files (Attributes/**/*.g.cs, Conventions/Qyl.g.cs) must not be hand-edited —
      change the YAML model and re-run ./eng/semconv/run-weaver.sh or `nuke OtelConventions`.
  - path: services/qyl.dashboard/tests/**
    instructions: 'Playwright e2e tests. Review for: test isolation, proper async
      patterns, meaningful assertions (not just "page loaded"), and that tests assert
      behavior not implementation details. Flag flaky patterns — never page.waitForTimeout;
      use page.waitForResponse / page.waitForSelector with specific selectors.'
  - path: tests/**/*.cs
    instructions: xUnit v3 with Microsoft Testing Platform (NOT xUnit v2). Run via
      `dotnet test --project` — positional args don't work. TRX via --report-xunit-trx.
      Use FakeChatClient (tests/qyl.collector.tests/Instrumentation/FakeChatClient.cs)
      for IChatClient doubles — never hand-rolled Mock<IChatClient>. Use TimeProvider
      / FakeTimeProvider for time. Pass TestContext.Current.CancellationToken into
      helpers — never CancellationToken.None. Temp files via Path.Join(Path.GetTempPath(),
      $"{Guid.NewGuid():N}.<ext>"); Path.GetTempFileName orphans a .tmp file every
      call. IAsyncDisposable over IDisposable for async resources.
  - path: eng/**
    instructions: 'Build & deployment infrastructure (Nuke + Docker Compose). Top-level
      orchestration via ./eng/build.sh <target> or `nuke <target>`; sub-targets are
      .Unlisted(). Compose file lives at eng/compose.yaml (not the repo root). Review
      for: correct MSBuild property usage, Nuke target dependencies, Docker multi-stage
      build efficiency. Flag hardcoded paths, secrets, or platform-specific assumptions.'
  - path: eng/semconv/model/qyl/**/*.yaml
    instructions: 'OpenTelemetry semantic conventions YAML. Review for: correct group
      types (span / metric / event / entity / attribute_group), explicit stability
      values from the official set (development / alpha / beta / release_candidate
      / stable — never "mixed", never "deprecated" as a stability state — `deprecated`
      is a separate property). Every model change must ship together with the regenerated
      downstream artefacts (./eng/semconv/run-weaver.sh AND nuke OtelConventions)
      — *.g.cs / *.g.ts / *.g.sql / *.g.tsp / *.g.md outputs in the same commit as
      the source.'
  - path: core/specs/**/*.tsp
    instructions: TypeSpec API contracts. Regeneration via `nuke Generate` (patched
      by core/specs/scripts/patch-emitted-csharp.mjs). Endpoint implementations must
      track decorators — declared NotFoundError → TypedResults.NotFound(); pagination
      default/max read from the spec, not re-hardcoded. Generated outputs ship with
      the source change.
  - path: ".github/**"
    instructions: GitHub Actions workflows. Pin actions by SHA, never floating tags.
      No secrets in logs. Flag missing concurrency groups on push-triggered workflows,
      unnecessary triggers, and job dependency mistakes.
  abort_on_close: true
  disable_cache: true
  slop_detection:
    enabled: true
    label: review:slop
  auto_review:
    enabled: true
    description_keyword: "@coderabbitai review"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
    - "[skip review]"
    labels: []
    drafts: true
    base_branches:
    - ".*"
    ignore_usernames: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true
    custom:
    - enabled: true
      name: architecture hardening
      instructions: Refactor only changed code where doing so removes meaningful duplication,
        hidden fallback paths, tangled responsibilities, or brittle coupling. Preserve
        behavior unless the PR explicitly changes it. Prefer deleting bad indirection
        over adding wrappers. Include tests or note exactly why no test can cover
        the improvement.
    - enabled: true
      name: security pass
      instructions: Inspect the PR for secrets, injection risk, path traversal, unsafe
        deserialization, authz/authn drift, overbroad logging, unsafe dependency changes,
        and CI token permission expansion. Apply minimal fixes directly when safe;
        otherwise leave precise comments.
    - enabled: true
      name: test gap closure
      instructions: Generate focused tests for changed behavior and edge cases. Prefer
        existing test frameworks and fixtures. Do not create broad snapshot churn
        or tests that merely assert implementation details. Include regression tests
        for bugs and riskier boundary changes.
    - enabled: true
      name: docs and changelog alignment
      instructions: Update docs, README, AGENTS/CLAUDE guidance, generated reference
        docs, and changelog entries only where the PR changes user-visible behavior,
        public contracts, workflows, or agent instructions. Keep entries concise and
        consistent with repo rules.
    - enabled: true
      name: performance and allocation pass
      instructions: Review changed hot paths for avoidable allocations, repeated parsing,
        unbounded concurrency, N+1 calls, missing streaming/backpressure, and inefficient
        data structures. Apply low-risk improvements with tests or benchmarks where
        the repo already has them.
  pre_merge_checks:
    override_requested_reviewers_only: true
    docstrings:
      mode: warning
      threshold: 75
    title:
      mode: error
      requirements: Conventional commits with an area scope; under 72 characters;
        no trailing punctuation; accurately names the highest-impact change.
    description:
      mode: error
    issue_assessment:
      mode: warning
    custom_checks:
    - mode: error
      name: No Secrets Or PII
      instructions: 'Pass/fail criteria: fail if the PR adds secrets, tokens, credentials,
        private keys, real user data, personal data, API keys, connection strings,
        or logs that expose sensitive request/response bodies. Test placeholders are
        allowed only when obviously synthetic and documented.'
    - mode: error
      name: Generated Files Regenerated
      instructions: 'Pass/fail criteria: if a source schema/model/template/generator
        input changes, all generated downstream files required by the repository must
        be updated in the same PR. Fail if generated files appear hand-edited without
        the source generator/input change, or if generated output is missing after
        source-model changes.'
    - mode: error
      name: Async And Cancellation Safe
      instructions: 'Pass/fail criteria: fail C#/TS/Python changes that introduce
        sync-over-async, unobserved fire-and-forget work, missing CancellationToken/AbortSignal
        propagation on public/internal async boundaries, sleeps for synchronization,
        or resource disposal paths that can drop in-flight work.'
    - mode: error
      name: Public Contract Documented
      instructions: 'Pass/fail criteria: fail if public APIs, endpoint schemas, CLI
        flags, config keys, package surfaces, storage formats, event schemas, MCP
        tool schemas, or generated contracts change without matching docs/tests and
        explicit compatibility notes in the PR description or changelog where the
        repo uses one.'
    - mode: error
      name: CI Release Safety
      instructions: 'Pass/fail criteria: if no workflow/build/release files changed,
        pass. Fail when a changed workflow removes an existing validation job, removes
        concurrency from push/PR workflows, adds --admin/force-push/bypass commands,
        increases token permissions beyond contents:read without inline rationale,
        exposes secrets in command arguments/logs, changes publish triggers to run
        outside tags or approved environments, or allows a previously required failing
        check to be ignored.'
    - mode: warning
      name: Tests Match Risk
      instructions: 'Pass/fail criteria: warn when production behavior changes without
        focused tests or when tests only assert implementation details. Require integration/e2e
        coverage for persistence, queues, external-service boundaries, generated contracts,
        migrations, or user-visible workflows touched by the PR.'
    - mode: warning
      name: No Copy Paste Tables
      instructions: 'Pass/fail criteria: warn when a PR introduces hardcoded repetitive
        case lists, hand-maintained mapping tables, duplicate switch branches, or
        parallel arrays where a data-driven or generated structure would be more maintainable.
        Do not warn for small explicit protocol enums or tests where duplication clarifies
        cases.'
    - mode: warning
      name: No Hidden Fallback Path
      instructions: 'Pass/fail criteria: warn when code catches and silently falls
        back, adds compatibility wrappers, duplicate implementation paths, or default
        behavior that hides upstream failure unless the fallback is a documented product
        requirement with tests for both paths.'
    - mode: warning
      name: Observability Boundary
      instructions: 'Pass/fail criteria: warn when new services, background jobs,
        queues, network clients, storage writers, MCP tools, or agent workflows lack
        structured logging, tracing/metrics where the repository already uses them,
        or actionable error context.'
    - mode: warning
      name: Dependency Hygiene
      instructions: 'Pass/fail criteria: warn when dependencies are added without
        clear need, version pins drift from central package files, lockfile changes
        do not match manifest changes, transitive security-sensitive packages are
        introduced, or package manager conventions are violated.'
    - name: OTel instrumentation required
      mode: error
      instructions: 'If this PR adds a new injectable service class (any class registered
        in DI), verify that it registers an ActivitySource or Meter for OpenTelemetry
        instrumentation. A new service without OTel instrumentation is a gap in observability.
        Pass if: no new services added, or all new services have instrumentation.
        Fail if: a new service is registered but has no corresponding ActivitySource/Meter.'
    - name: No unbounded MCP responses
      mode: error
      instructions: 'If this PR adds or modifies MCP tool definitions (under services/qyl.mcp/),
        verify that every tool returning a collection includes a clamped `limit` parameter
        or pagination mechanism. Pass if: no MCP tool changes, or all collection-returning
        tools are bounded. Fail if: a tool can return an unbounded list.'
    - name: DuckDB writes via ExecuteWriteAsync
      mode: error
      instructions: 'If this PR modifies services/qyl.collector/{Storage,Workflows,AgentRuns,Errors,Alerts,Insights,Ingestion}/,
        verify that every UPDATE/INSERT/DELETE/CREATE/ALTER statement runs inside
        DuckDbStore.ExecuteWriteAsync(async (connection, ct) => …, ct) and not through
        a GetReadConnectionAsync lease (READ_ONLY). Pass if: no store changes, or
        every write statement is inside ExecuteWriteAsync. Fail if: a write executes
        against a read lease.'
    - name: CancellationToken threaded through async methods
      mode: error
      instructions: 'If this PR adds or modifies public/internal async methods, verify
        each accepts a CancellationToken parameter (named `cancellationToken` or `ct`
        per project style) and threads it through every downstream await. Pass if:
        no async signature changes, or every new/changed async method accepts and
        forwards a CancellationToken. Fail if: an async method silently uses CancellationToken.None
        or skips forwarding.'
    - name: MAF telemetry — both layers wrapped
      mode: error
      instructions: 'If this PR constructs an AIAgent (services/qyl.loom*/Agents/,
        services/qyl.mcp/Agents/), verify BOTH the IChatClient (.WithQylTelemetry
        / .UseQylTelemetry on the builder) AND the AIAgent (.AsBuilder().UseQylAgentTelemetry().Build())
        are decorated. Wrapping one and not the other halves OTel coverage. Pass if:
        no agent construction added, or both layers are wrapped. Fail if: only one
        layer is wrapped.'
    - name: Generated artefacts ship with their source
      mode: error
      instructions: 'If this PR modifies any *.g.cs / *.g.ts / *.g.sql / *.g.tsp /
        *.g.md file, the source must also change in the same PR (core/specs/**/*.tsp,
        eng/semconv/model/**/*.yaml, or a Roslyn source generator input). Conversely,
        if a TypeSpec/semconv source changes, the regenerated artefacts must also
        be present. Pass if: every generated change has a matching source change and
        vice versa. Fail if: generated files appear hand-edited or source changes
        lack regenerated outputs.'
    - name: No analyzer suppression
      mode: error
      instructions: 'Flag any new `#pragma warning disable`, `[SuppressMessage]`,
        `<NoWarn>` MSBuild addition, or `null!` introduced by this PR in production
        code (non-test). The codebase fixes at source rather than suppressing. Pass
        if: no new suppressions introduced. Fail if: a new suppression is added without
        a tracking comment justifying it.'
