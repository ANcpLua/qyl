  - "!**/obj/**"
  - "!**/dist/**"
  - "!**/node_modules/**"
  - "!**/coverage/**"
  - "!**/.angular/**"
  - "!**/.vite/**"
  - "!**/.next/**"
  - "!**/*.min.js"
  - "!**/*.min.css"
  - "!Artifacts/**"
  - "!artifacts/**"
  - "!**/*.sarif"
  - "!**/*.trx"
  path_instructions:
  - path: "**/*.cs"
    instructions: C#/.NET review. Treat warnings, nullable annotations, async flow,
      package boundaries, and generated code as correctness concerns. Flag sync-over-async
