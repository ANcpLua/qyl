  - path: ".github/workflows/**"
    instructions: GitHub Actions review. Pin third-party actions to immutable SHAs
      unless the repo explicitly documents tag-pinning; keep permissions minimal per
      job; use concurrency for push/PR workflows; avoid secrets in command lines/logs;
      keep required and non-blocking jobs clear; preserve tokenless OIDC upload patterns
      where used; and flag any admin-bypass, force-push, destructive cleanup, or auto-merge
      behavior that can mask a failed required check.
  - path: "**/Dockerfile"
    instructions: Container review. Check multi-stage build cacheability, minimal
      runtime images, non-root execution where practical, healthchecks for long-running
      services, explicit versions for infrastructure images, no baked secrets, and
      alignment between compose ports, appsettings/env vars, and test infrastructure.
