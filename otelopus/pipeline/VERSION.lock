# otelopus version lock — pin these to get deterministic, idempotent output
# If any version changes, ALL generated files must be regenerated.
#
# To update: change the version here, run `nuke Generate`, commit the diff.
# To verify: `nuke Generate` on a clean checkout must produce zero diff.

[upstream]
opentelemetry-specification = "1.55.0"
opentelemetry-proto         = "1.10.0"
semantic-conventions        = "1.40.0"

[upstream.commits]
# Pin to exact commits for reproducibility.
# Tags can be force-pushed; commits cannot.
opentelemetry-proto    = "aca8735"
semantic-conventions   = "682f2d61"

[npm]
# The npm package is the actual input to Stage 1.
# This MUST match the semantic-conventions version above.
@opentelemetry/semantic-conventions = "1.40.0"

[tools]
# Generator toolchain versions. Different versions = different output.
typespec-compiler   = ""   # TODO: pin from package.json
protoc              = ""   # TODO: pin or remove if not used
openapi-typescript  = ""   # TODO: pin from package.json
nuke                = ""   # TODO: pin from global.json or dotnet-tools.json

[dotnet]
# The OTel .NET SDK version qyl links against.
# Determines which ActivitySource/Meter APIs are available.
OpenTelemetry                       = ""  # TODO: from Directory.Packages.props
OpenTelemetry.Extensions.Hosting    = ""  # TODO: from Directory.Packages.props
System.Diagnostics.DiagnosticSource = ""  # TODO: from Directory.Packages.props

[checksums]
# SHA-256 of each upstream file in otelopus/proto/ and otelopus/semconv/.
# If a checksum doesn't match, the file was modified outside the pipeline.
# Populate by running: sha256sum otelopus/proto/* otelopus/semconv/*
