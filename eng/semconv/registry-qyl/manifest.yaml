# qyl semconv registry manifest.
# Composes upstream OpenTelemetry v1.40.0 + qyl-specific extensions.
#
# Weaver is invoked with --registry pointing at upstream/model;
# this manifest is consumed by our template layer via --param to select which
# upstream prefixes are surfaced in qyl's generated code.

name: qyl.semconv
semconv_version: 1.40.0

# Upstream prefixes that feed qyl's generated outputs. Everything else in the
# upstream registry is ignored (keeps our generated files lean).
include_prefixes:
  # AI
  - gen_ai
  - code
  # Transport
  - http
  - rpc
  - messaging
  - url
  - user_agent
  - signalr
  - kestrel
  # Data
  - db
  - file
  - vcs
  - artifact
  - elasticsearch
  # Infra
  - cloud
  - container
  - k8s
  - host
  - os
  - faas
  - webengine
  # Security
  - network
  - tls
  - dns
  # Runtime
  - process
  - thread
  - system
  - dotnet
  - aspnetcore
  # Identity
  - user
  - enduser
  - geo
  - client
  - server
  - service
  - telemetry
  # Observe
  - browser
  - session
  - exception
  - error
  - log
  - feature_flag
  - otel
  - test
  # Profiling
  - profile
  - pprof
  # Ops
  - cicd
  - deployment
  # Vendor
  - openai
  - azure
  - oracle
  - oracle_cloud
