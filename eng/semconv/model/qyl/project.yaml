groups:
  - id: registry.qyl.project
    type: attribute_group
    brief: 'Attributes identifying the qyl project scope'
    attributes:
      - id: qyl.project.id
        type: string
        stability: development
        brief: 'Project identifier (UUID or slug)'
        examples: ['proj_01hzv8x', 'my-service']
      - id: qyl.project.name
        type: string
        stability: development
        brief: 'Human-readable project name'
        examples: ['My Service', 'qyl collector']
