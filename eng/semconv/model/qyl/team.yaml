groups:
  - id: registry.qyl.team
    type: attribute_group
    brief: 'Attributes identifying the owning team'
    attributes:
      - id: qyl.team.id
        type: string
        stability: experimental
        brief: 'Team identifier'
        examples: ['team_01hzv8x', 'platform-eng']
      - id: qyl.team.name
        type: string
        stability: experimental
        brief: 'Human-readable team name'
        examples: ['Platform Engineering', 'Backend']
