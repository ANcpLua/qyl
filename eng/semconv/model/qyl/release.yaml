groups:
  - id: registry.qyl.release
    type: attribute_group
    brief: 'Attributes for qyl release/deployment identification on spans'
    attributes:
      - id: qyl.release.version
        type: string
        stability: development
        brief: 'Semantic or calendar version identifier for the release'
        examples: [ '2.0.1', '2026.04.24.3' ]
      - id: qyl.release.commit_sha
        type: string
        stability: development
        brief: 'Full 40-character git SHA for the release commit'
        examples: [ 'd6e3a2f9b1c4e8a7d5b2c9f1e6a4d3b8c7f2a1e9' ]
      - id: qyl.release.environment
        type: string
        stability: development
        brief: 'Deployment environment name'
        examples: [ 'production', 'staging', 'development' ]
      - id: qyl.release.channel
        type:
          members:
            - id: stable
              value: 'stable'
              stability: development
              brief: 'Stable release track — general availability'
            - id: beta
              value: 'beta'
              stability: development
              brief: 'Beta release track — feature-complete, broader testing'
            - id: canary
              value: 'canary'
              stability: development
              brief: 'Canary release track — limited rollout for early detection'
            - id: preview
              value: 'preview'
              stability: development
              brief: 'Preview release track — experimental, may break'
        stability: development
        brief: 'Release track the deployment belongs to'
