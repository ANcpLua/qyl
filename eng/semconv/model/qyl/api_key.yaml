groups:
  - id: registry.qyl.api_key
    type: attribute_group
    brief: 'Attributes for qyl API key tracking (masked for security)'
    attributes:
      - id: qyl.api_key.id
        type: string
        stability: development
        brief: >
          First 8 characters of the API key hash (sha256[:8]).
          Never log the full key. Used for audit trails only.
        examples: ['a1b2c3d4']
