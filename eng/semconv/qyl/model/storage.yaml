groups:
  - id: registry.qyl.storage
    type: attribute_group
    brief: 'Attributes for qyl DuckDB storage instrumentation'
    prefix: qyl.storage
    attributes:
      - id: size
        type: int
        stability: development
        brief: 'Current DuckDB database file size in bytes'
  - id: registry.qyl.duckdb
    type: attribute_group
    brief: 'Counters for qyl DuckDB write pipeline'
    prefix: qyl.duckdb
    attributes:
      - id: dropped_jobs_total
        type: int
        stability: development
        brief: 'Cumulative count of background write jobs dropped (back-pressure)'
      - id: dropped_spans_total
        type: int
        stability: development
        brief: 'Cumulative count of span records dropped before persistence'
