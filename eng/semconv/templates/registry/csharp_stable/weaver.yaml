# Weaver template config for Qyl.OpenTelemetry.SemanticConventions (stable attrs only).
# Outputs one .g.cs per root_namespace, plus SchemaUrl.g.cs and SchemaVersion.g.cs.
# Stability filter: stability == "stable" only (development → Incubating package).
#
# Discovered invariants (do not change without re-testing):
#   - semconv_grouped_attributes returns one synthetic group per root_namespace (Weaver aggregates).
#   - application_mode: each → one file per group → one file per namespace (no collisions).
#   - attr.deprecated is a structured object {note, reason, renamed_to} or null.
#   - String slicing attr.name[(ns|length+1):] works; replace(old, new, count) does NOT.

whitespace_control:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true

params:
  schema_url: "https://opentelemetry.io/schemas/1.41.0"
  schema_version: "1.41.0"
  semconv_commit: "e018fe6f91862f5ed63c082f87697cddac596784"
  package_namespace: "Qyl.OpenTelemetry.SemanticConventions"

  # Reserved attrs verified present by the NUKE OtelConventions target.
  # If any are missing from generated output, the build fails.
  reserved_attrs:
    - "error.type"
    - "exception.message"
    - "exception.stacktrace"
    - "exception.type"
    - "server.address"
    - "server.port"
    - "service.name"
    - "service.instance.id"
    - "telemetry.sdk.language"
    - "telemetry.sdk.name"
    - "telemetry.sdk.version"
    - "url.scheme"

# C# XML-doc comment formatting. The `comment` Jinja filter applies these rules
# automatically — replaces the manual `replace('&','&amp;')|...` chains in the
# old templates and the html-snippet handling for <c>code</c>/<code>blocks</code>.
comment_formats:
  csharp:
    format: html
    header: "/// <summary>"
    prefix: "/// "
    footer: "/// </summary>"
    old_style_paragraph: true
    omit_closing_li: false
    inline_code_snippet: "<c>{{code}}</c>"
    block_code_snippet: "<code>{{code}}</code>"
    trim: true
    remove_trailing_dots: false
    enforce_trailing_dots: true
default_comment_format: csharp

templates:
  # Drop groups whose stable-attribute slice is empty BEFORE Weaver decides to
  # create files. Without this, application_mode: each emits one empty .g.cs
  # per group whose attributes are all non-stable (deprecated, development, etc.) —
  # 72 of 90 in v1.41.0.
  - template: attributes.cs.j2
    filter: >
      semconv_grouped_attributes
      | map(select(.attributes | map(select(.stability == "stable")) | length > 0))
    application_mode: each
    file_name: "Attributes/{{ ctx.root_namespace | pascal_case }}/{{ ctx.root_namespace | pascal_case }}Attributes.g.cs"

  # Single-mode templates ignore .ctx and read params.schema_url / schema_version.
  # filter "." passes the whole registry; we don't actually iterate.
  - template: schema_url.cs.j2
    filter: "."
    application_mode: single
    file_name: "SchemaUrl.g.cs"

  - template: schema_version.cs.j2
    filter: "."
    application_mode: single
    file_name: "SchemaVersion.g.cs"
