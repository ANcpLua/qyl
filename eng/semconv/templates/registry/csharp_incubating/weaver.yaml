# Weaver template config for Qyl.OpenTelemetry.SemanticConventions.Incubating.
# Outputs one .g.cs per root_namespace, plus SchemaUrl.g.cs and SchemaVersion.g.cs.
# Stability filter: anything NOT stable (development, alpha, beta, release_candidate).
# `deprecated` is separate metadata, not a stability value. Stable attrs ship in
# the sister Stable package.

whitespace_control:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true

params:
  schema_url: "https://opentelemetry.io/schemas/1.41.0"
  schema_version: "1.41.0"
  semconv_commit: "e018fe6f91862f5ed63c082f87697cddac596784"
  package_namespace: "Qyl.OpenTelemetry.SemanticConventions.Incubating"

comment_formats:
  csharp:
    format: html
    header: "/// <summary>"
    prefix: "/// "
    footer: "/// </summary>"
    old_style_paragraph: true
    omit_closing_li: false
    inline_code_snippet: "<c>{{code}}</c>"
    block_code_snippet: "<code>{{code}}</code>"
    trim: true
    remove_trailing_dots: false
    enforce_trailing_dots: true
default_comment_format: csharp

templates:
  # Drop groups whose non-stable-attribute slice is empty BEFORE Weaver decides
  # to create files. Without this, application_mode: each emits one empty .g.cs
  # per group whose attributes are all stable (those ship in the Stable package).
  - template: attributes.cs.j2
    filter: >
      semconv_grouped_attributes
      | map(select(.attributes | map(select(.stability != "stable")) | length > 0))
    application_mode: each
    file_name: "Attributes/{{ ctx.root_namespace | pascal_case }}/{{ ctx.root_namespace | pascal_case }}Attributes.g.cs"

  - template: schema_url.cs.j2
    filter: "."
    application_mode: single
    file_name: "SchemaUrl.g.cs"

  - template: schema_version.cs.j2
    filter: "."
    application_mode: single
    file_name: "SchemaVersion.g.cs"
