# qyl. - AI Observability Platform
# Development Docker Compose - Run from repository root
#
# Usage:
#   docker compose -f eng/compose.yaml up -d
#   docker compose -f eng/compose.yaml down
#
# One topology: the collector image embeds the dashboard, so a single service serves
# UI + REST API + SSE on :5100 and OTLP ingest on :4317/:4318. The standalone
# dashboard/nginx service was deleted 2026-07-11 (repair-plan phase 3).

services:
  qyl-collector:
    build:
      context: ..
      dockerfile: services/qyl.collector/Dockerfile
    container_name: qyl-collector
    ports:
      - "5100:5100"    # Dashboard + REST API + SSE
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - qyl-data:/data
    environment:
      - QYL_PORT=5100
      - QYL_GRPC_PORT=4317
      - QYL_OTLP_PORT=4318
      - QYL_DATA_PATH=/data/qyl.duckdb
      - ASPNETCORE_URLS=http://+:5100
      # Dev stack: without this the collector fails closed at boot (Production defaults
      # OTLP auth to ApiKey and refuses to start with no keys configured). Set real keys
      # via QYL_OTLP_PRIMARY_API_KEY instead when exposing this stack beyond localhost.
      - QYL_OTLP_AUTH_MODE=Unsecured
    restart: unless-stopped
    healthcheck:
      # curl, not wget: the runtime image installs curl only.
      test: [ "CMD", "curl", "-sf", "http://localhost:5100/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qyl-data:
    driver: local
