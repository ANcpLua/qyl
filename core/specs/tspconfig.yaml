# QYL TypeSpec Configuration
# Source: core/specs/main.tsp
# Post-Commit-6 cutover: native @qyl emitters + @typespec/http-client-* ship
# C# records, DuckDB schema, TS types, C# client, JS client, JSON schemas.
# openapi3 + openapi.yaml retained until Commit 10 atomic removal.

emit:
  - "@qyl/typespec-emit-csharp"
  - "@qyl/typespec-emit-duckdb"
  - "@qyl/typespec-emit-ts-types"
  - "@typespec/http-client-csharp"
  - "@typespec/http-client-js"
  - "@typespec/json-schema"
  # "@typespec/http-server-csharp" is installed (core/specs/package.json devDep) but NOT
  # activated. The alpha emits model types into the same TypeSpec-declared namespaces
  # that @qyl/typespec-emit-csharp already owns (e.g. `Qyl.OTel.Traces.SpanEvent`),
  # producing duplicate-definition compile errors. The alpha also emits syntactically
  # invalid C# (CS1009 escape-sequence errors in JSON-Schema pattern strings).
  # Activation is blocked on docs/planned/2026-04-21-http-server-csharp-cutover.md.

options:
  "@qyl/typespec-emit-csharp":
    emitter-output-dir: "{project-root}/../../packages/Qyl.Contracts/Generated"

  "@qyl/typespec-emit-duckdb":
    emitter-output-dir: "{project-root}/../../services/qyl.collector/Storage"

  "@qyl/typespec-emit-ts-types":
    emitter-output-dir: "{project-root}/../../packages/qyl-client/src/generated"

  "@typespec/http-client-csharp":
    emitter-output-dir: "{project-root}/../../packages/Qyl.Client/Generated"
    package-name: "Qyl.Client"
    generate-protocol-methods: true
    generate-convenience-methods: true
    disable-xml-docs: false
    new-project: false

  "@typespec/http-client-js":
    emitter-output-dir: "{project-root}/../../packages/qyl-client/src/generated"
    package-name: "@qyl/client"

  "@typespec/json-schema":
    emitter-output-dir: "{project-root}/../../packages/qyl-client/schemas"
    file-type: json
    bundleId: qyl-api

linter:
  extends:
    - "@typespec/http/all"
